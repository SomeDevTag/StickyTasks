<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StickyTasks</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='8' y='8' width='48' height='48' rx='9' fill='%23FCD34D'/><path d='M56 40 L40 56 L40 45 a5 5 0 0 1 5 -5 Z' fill='%23E5B93B'/><circle cx='25' cy='30' r='3.6' fill='%231F2937'/><circle cx='39' cy='30' r='3.6' fill='%231F2937'/><circle cx='26.3' cy='28.7' r='1.15' fill='%23fff'/><circle cx='40.3' cy='28.7' r='1.15' fill='%23fff'/><ellipse cx='18.5' cy='37.5' rx='3' ry='2' fill='%23F9A66C'/><ellipse cx='45.5' cy='37.5' rx='3' ry='2' fill='%23F9A66C'/><path d='M26 39 Q32 45 38 39' fill='none' stroke='%231F2937' stroke-width='2.4' stroke-linecap='round'/></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23fff'/><rect x='8' y='8' width='48' height='48' rx='9' fill='%23FCD34D'/><path d='M56 40 L40 56 L40 45 a5 5 0 0 1 5 -5 Z' fill='%23E5B93B'/><circle cx='25' cy='30' r='3.6' fill='%231F2937'/><circle cx='39' cy='30' r='3.6' fill='%231F2937'/><circle cx='26.3' cy='28.7' r='1.15' fill='%23fff'/><circle cx='40.3' cy='28.7' r='1.15' fill='%23fff'/><ellipse cx='18.5' cy='37.5' rx='3' ry='2' fill='%23F9A66C'/><ellipse cx='45.5' cy='37.5' rx='3' ry='2' fill='%23F9A66C'/><path d='M26 39 Q32 45 38 39' fill='none' stroke='%231F2937' stroke-width='2.4' stroke-linecap='round'/></svg>">
<script>
  /* set the theme before first paint so there is no light-mode flash */
  (function(){
    try{
      var t = localStorage.getItem("floating-tasks.theme");
      if(t!=="dark" && t!=="light"){
        t = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
      }
      document.documentElement.setAttribute("data-theme", t);
    }catch(e){ document.documentElement.setAttribute("data-theme","light"); }
  })();
</script>
<style>
  :root{
    --bg:#eef2f7;
    --dot:#d3dce8;
    --header:#ffffff;
    --surface:#ffffff;
    --border:#e2e8f0;
    --chip:#f8fafc;
    --chip-hover:#eef2f7;
    --ink:#1f2937;
    --muted:#6b7280;
    --accent:#3b82f6;
    --good:#22c55e;
    --good-dark:#16a34a;
    --danger:#ef4444;
    --note-bg:#fffdf7;
    --n-border:rgba(0,0,0,.06);
    --n-muted:rgba(0,0,0,.42);
    --n-faint:rgba(0,0,0,.32);
    --n-xhover:rgba(0,0,0,.12);
    --pill:rgba(0,0,0,.1);
    --toast-bg:#1f2937;
    --toast-fg:#ffffff;
    --wire:#9aa7b8;
    --shadow:0 6px 16px rgba(31,41,55,.16), 0 2px 4px rgba(31,41,55,.10);
    --shadow-lg:0 18px 40px rgba(31,41,55,.28), 0 6px 12px rgba(31,41,55,.18);
    /* frosted-glass UI tokens */
    --glass:rgba(255,255,255,.6);
    --glass-brd:rgba(255,255,255,.7);
    --glass-fill:rgba(0,0,0,.05);
    --glass-fill-h:rgba(0,0,0,.09);
    --seg-active:#ffffff;
    --accent-soft:rgba(59,130,246,.16);
    --glass-shadow:0 8px 30px rgba(17,24,39,.14), 0 2px 8px rgba(17,24,39,.08);
    --glass-blur:saturate(180%) blur(20px);
  }
  :root[data-theme="dark"]{
    --bg:#0f141b;
    --dot:#273240;
    --header:#151b24;
    --surface:#1b222c;
    --border:#2a3543;
    --chip:#1c242f;
    --chip-hover:#26303c;
    --ink:#e6eaf1;
    --muted:#98a3b3;
    --accent:#60a5fa;
    --good:#22c55e;
    --good-dark:#5ee08a;
    --danger:#f87171;
    --note-bg:#1e2632;
    --n-border:rgba(255,255,255,.08);
    --n-muted:rgba(255,255,255,.5);
    --n-faint:rgba(255,255,255,.38);
    --n-xhover:rgba(255,255,255,.16);
    --pill:rgba(255,255,255,.14);
    --toast-bg:#2b3542;
    --toast-fg:#e6eaf1;
    --wire:#6b7d92;
    --shadow:0 6px 16px rgba(0,0,0,.5), 0 2px 4px rgba(0,0,0,.4);
    --shadow-lg:0 18px 40px rgba(0,0,0,.62), 0 6px 12px rgba(0,0,0,.45);
    --glass:rgba(30,34,42,.58);
    --glass-brd:rgba(255,255,255,.12);
    --glass-fill:rgba(255,255,255,.08);
    --glass-fill-h:rgba(255,255,255,.14);
    --seg-active:rgba(255,255,255,.18);
    --accent-soft:rgba(96,165,250,.22);
    --glass-shadow:0 8px 30px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.4);
  }
  #ctxMenu, #colorPop, #menuPop, .done-card{
    transition: background-color .25s ease, border-color .25s ease, color .25s ease;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    color:var(--ink);
    background:var(--bg);
    overflow:hidden;
  }

  /* ---------- floating frosted-glass bubbles (header + pages) ---------- */
  .bubble{
    position:fixed; z-index:40;
    background:var(--glass); color:var(--ink);
    -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd); border-radius:18px; box-shadow:var(--glass-shadow);
  }
  .icon-btn{
    border:none; background:var(--glass-fill); color:var(--ink);
    width:32px; height:32px; border-radius:10px; cursor:pointer;
    font-size:17px; display:inline-flex; align-items:center; justify-content:center; transition:.15s;
  }
  .icon-btn:hover{background:var(--glass-fill-h)}

  /* one combined bubble: title row + tabs + pages */
  #headerBar{
    top:14px; left:14px; width:208px; max-height:calc(100vh - 28px);
    display:flex; flex-direction:column; padding:8px;
  }
  .bar-top{display:flex; align-items:center; gap:8px; padding:2px 2px 8px}
  .bar-top .logo{display:inline-flex; width:22px; height:22px}
  .bar-top h1{
    font-size:15.5px; margin:0; letter-spacing:.2px; font-weight:700; color:var(--ink);
    flex:1; white-space:nowrap;
  }
  .tabs{display:flex; gap:3px; margin-bottom:8px; background:var(--glass-fill); padding:3px; border-radius:12px}
  .tab{
    flex:1; border:none; background:transparent; color:var(--muted);
    padding:6px 10px; border-radius:9px; cursor:pointer; font-size:12.5px; font-weight:600;
    display:flex; align-items:center; justify-content:center; gap:6px; transition:.15s;
  }
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--seg-active); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.14)}
  .badge{
    background:var(--glass-fill); color:var(--muted); min-width:18px; text-align:center;
    padding:0 6px; border-radius:999px; font-size:10.5px; font-weight:700;
  }
  .tab.active .badge{background:var(--accent-soft); color:var(--accent)}
  .side-sep{height:1px; background:var(--glass-fill-h); margin:0 2px 8px}
  .side-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:0 6px 6px; font-size:10.5px; font-weight:700; letter-spacing:.6px;
    text-transform:uppercase; color:var(--muted);
  }
  .side-add{
    border:none; background:var(--glass-fill); color:var(--accent);
    width:24px; height:24px; border-radius:8px; cursor:pointer; font-size:16px; line-height:1;
    display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  .side-add:hover{background:var(--glass-fill-h)}
  .page-list{overflow:auto; padding:0 2px 2px}
  .page-item{
    display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px;
    cursor:pointer; color:var(--ink); font-size:13.5px; margin-bottom:2px; transition:.12s; background:transparent;
  }
  .page-item:hover{background:var(--glass-fill)}
  .page-item.active{font-weight:600}
  .page-item .page-dot{width:10px; height:10px; border-radius:50%; flex:none; box-shadow:0 0 0 1px rgba(0,0,0,.1)}
  .page-item .page-name{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .page-item .page-input{
    flex:1; min-width:0; border:none; outline:none; background:transparent;
    font:inherit; font-size:13.5px; color:var(--ink); padding:0;
  }
  .page-item .page-del{
    opacity:0; width:18px; height:18px; line-height:16px; text-align:center; border-radius:50%;
    font-size:13px; color:inherit; flex:none; transition:.12s;
  }
  .page-item:hover .page-del{opacity:.7}
  .page-item .page-del:hover{opacity:1; background:var(--glass-fill-h)}
  .page-item .page-grip{
    flex:none; width:12px; margin-left:-4px; text-align:center; font-size:11px; line-height:1;
    color:var(--muted); cursor:grab; opacity:0; transition:opacity .12s; touch-action:none; user-select:none;
  }
  .page-item:hover .page-grip{opacity:.6}
  .page-item .page-grip:hover{opacity:1}
  .page-item.page-dragging{
    background:var(--glass-fill-h); box-shadow:0 6px 16px rgba(0,0,0,.22);
    position:relative; z-index:6; cursor:grabbing;
  }
  .page-item.page-dragging .page-grip{opacity:1; cursor:grabbing}
  .page-drop-line{
    height:2px; margin:1px 8px; border-radius:2px; background:var(--accent);
    box-shadow:0 0 5px var(--accent); pointer-events:none;
  }

  /* ---------- dropdown menu (hidden extras) ---------- */
  #menuPop{
    position:fixed; z-index:1000; min-width:188px;
    background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd); border-radius:14px; padding:6px; box-shadow:var(--glass-shadow);
  }
  #menuPop .m-item{
    display:flex; align-items:center; gap:10px; width:100%;
    border:none; background:transparent; color:var(--ink);
    padding:9px 10px; border-radius:9px; cursor:pointer; font:inherit; font-size:13.5px; text-align:left;
  }
  #menuPop .m-item:hover{background:var(--glass-fill)}
  #menuPop .m-sep{height:1px; background:var(--glass-fill-h); margin:5px 4px}
  #menuPop .m-info{padding:6px 10px; font-size:12px; color:var(--muted)}

  /* ---------- views (full-bleed board) ---------- */
  .view{position:absolute; inset:0}
  .hidden{display:none !important}

  /* ---------- board ---------- */
  #board{
    overflow:hidden;
    background-image:radial-gradient(var(--dot) 1.4px, transparent 1.4px);
    background-size:22px 22px;
    background-position:-11px -11px;
    touch-action:none;
  }
  #board.panning{cursor:grabbing}
  #board.panning .note{pointer-events:none}
  /* the pannable layer that holds every note; middle-drag slides it around */
  #world{position:absolute; inset:0; transform-origin:0 0; will-change:transform}
  .hint{
    position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
    text-align:center; color:var(--muted); pointer-events:none; user-select:none;
    max-width:460px; line-height:1.6;
  }
  .hint .big{font-size:34px; margin-bottom:8px; opacity:.5}

  /* ---------- sticky note ---------- */
  .note{
    position:absolute; width:200px; min-height:44px;
    padding:14px 14px 12px; border-radius:12px;
    background:var(--note-bg);
    box-shadow:var(--shadow);
    transform:rotate(var(--rot,0deg));
    cursor:grab; user-select:none;
    transition:box-shadow .15s, transform .12s;
    border:1px solid var(--n-border);
    touch-action:none;               /* let us handle touch-drag ourselves */
  }
  .note .bar{position:absolute; top:0; left:0; right:0; height:6px; border-radius:11px 11px 0 0; background:var(--accent,#3b82f6)}
  /* drag-to-connect handle on the right edge */
  .note .link-handle{
    position:absolute; right:-9px; top:calc(50% - 9px);
    width:18px; height:18px; border-radius:50%;
    background:var(--accent); border:2px solid var(--surface);
    box-shadow:0 1px 4px rgba(0,0,0,.35);
    cursor:crosshair; opacity:0; pointer-events:none;
    transition:opacity .12s, transform .1s;
  }
  .note.hovered .link-handle,
  .note.activated .link-handle{opacity:1; pointer-events:auto}
  .note .link-handle:hover{transform:scale(1.22)}
  .note.dragging .link-handle{opacity:0; pointer-events:none}
  .note.link-target{outline:3px solid var(--accent); outline-offset:2px}
  /* tapped note on touch: highlight it and keep its controls visible */
  .note.activated{outline:2px solid var(--accent); outline-offset:2px}
  .note:hover{box-shadow:var(--shadow-lg)}
  .note.dragging{
    cursor:grabbing; z-index:9999 !important;
    transform:rotate(var(--rot,0deg)) scale(1.04);
    box-shadow:var(--shadow-lg); transition:none;
  }
  .note.completing{
    transition:transform .28s ease, opacity .28s ease;
    transform:scale(.2) rotate(var(--rot,0deg)); opacity:0;
  }
  .note .body{display:flex; align-items:flex-start; gap:8px; flex-wrap:wrap}
  .note .grip{flex:none; opacity:.4; font-size:13px; line-height:1.6; letter-spacing:1px; cursor:grab; user-select:none}
  .note .txt{
    flex:1; min-width:0;
    font-size:14px; line-height:1.45; word-break:break-word; white-space:pre-wrap;
    outline:none; min-height:20px;                 /* grows with content, no inner scroll */
  }
  .note .txt:empty:before{content:"New task…"; color:var(--n-faint)}
  /* subtask checklist — cute custom checkboxes tinted to the note's accent */
  .note .subs{display:flex; flex-direction:column; gap:3px; margin-top:9px}
  .note .subs:empty{display:none; margin:0}      /* no empty gap when there are no subtasks */
  .note .sub{display:flex; align-items:flex-start; gap:8px; font-size:13px; padding:2px 2px; border-radius:8px; transition:background .12s}
  .note .sub:hover{background:var(--n-xhover)}
  .note .sub .cb{
    appearance:none; -webkit-appearance:none; flex:none; position:relative;
    width:17px; height:17px; margin:1px 0 0; cursor:pointer;
    border:2px solid var(--n-muted); border-radius:6px; background:transparent;
    transition:background .15s, border-color .15s, transform .1s;
  }
  .note .sub .cb:hover{border-color:var(--accent)}
  .note .sub .cb:active{transform:scale(.88)}
  .note .sub.done .cb{background:var(--accent); border-color:var(--accent)}
  .note .sub.done .cb::after{
    content:""; position:absolute; left:4px; top:.5px; width:4px; height:8px;
    border:solid #fff; border-width:0 2px 2px 0; border-radius:1px; transform:rotate(42deg);
  }
  .note .sub .sub-txt{flex:1; min-width:0; outline:none; line-height:1.45; word-break:break-word; white-space:pre-wrap}
  .note .sub.done .sub-txt{text-decoration:line-through; text-decoration-color:var(--accent); opacity:.5}
  .note .sub .sub-x{flex:none; width:16px; text-align:center; color:var(--n-muted); cursor:pointer; opacity:0; transition:.12s}
  .note .sub:hover .sub-x{opacity:.6}
  .note .sub .sub-x:hover{opacity:1; color:var(--danger)}
  .note .sub .sub-grip{
    flex:none; width:14px; margin-top:1px; text-align:center; font-size:11px; line-height:17px;
    color:var(--n-muted); cursor:grab; opacity:0; transition:opacity .12s; touch-action:none; user-select:none;
  }
  .note .sub:hover .sub-grip{opacity:.5}
  .note .sub .sub-grip:hover{opacity:.9}
  .note .sub.sub-dragging{
    position:relative; z-index:6; background:var(--note-bg); border-radius:8px;
    box-shadow:0 6px 16px rgba(0,0,0,.22); cursor:grabbing;
  }
  .note .sub.sub-dragging .sub-grip{opacity:.9; cursor:grabbing}
  .note .sub-drop-line{
    height:2px; margin:1px 4px; border-radius:2px; background:var(--accent);
    box-shadow:0 0 5px var(--accent); pointer-events:none;
  }
  .note .sub-add{
    display:flex; align-items:center; gap:5px; width:max-content;
    font-size:11.5px; font-weight:600; letter-spacing:.2px; color:var(--n-muted); cursor:pointer;
    border-radius:999px; background:var(--n-xhover);
    max-height:0; opacity:0; margin-top:0; padding:0 10px; overflow:hidden; pointer-events:none;
    transition:max-height .2s ease, opacity .18s ease, margin-top .2s ease, padding .2s ease;
  }
  /* smoothly expand/collapse instead of snapping, so it's easy to reach and looks tidy */
  .note.hovered .sub-add, .note.activated .sub-add{
    max-height:30px; opacity:1; margin-top:8px; padding:4px 10px 4px 8px; pointer-events:auto;
  }
  .note .sub-add:hover{color:var(--accent); background:var(--accent-soft)}
  .note .time-badge{
    margin-top:8px; width:max-content; padding:2px 9px; border-radius:999px;
    font-size:11px; font-weight:700; letter-spacing:.2px;
    color:var(--accent); background:var(--accent-soft);
  }
  .note .time-badge.hidden{display:none}
  .note .time-badge.inline{margin-top:0; margin-left:auto; align-self:center}  /* rides the text's line when it fits */

  /* ---------- background groups ---------- */
  .group{position:absolute; z-index:1; border-radius:16px; box-shadow:0 4px 16px rgba(0,0,0,.06)}
  .group-head{
    display:flex; align-items:center; gap:6px; padding:7px 8px 7px 12px;
    border-radius:15px 15px 0 0; cursor:grab; user-select:none;
    font-size:13px; font-weight:600; color:var(--ink);
  }
  .group-head.dragging{cursor:grabbing}
  .group-name{flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .group-name-input{flex:1; min-width:0; border:none; outline:none; background:transparent; font:inherit; font-weight:600; color:var(--ink)}
  .group-btn{
    flex:none; width:22px; height:22px; border:none; border-radius:6px; cursor:pointer;
    background:rgba(0,0,0,.08); color:var(--ink); font-size:12px;
    display:flex; align-items:center; justify-content:center; transition:.12s;
  }
  .group-btn:hover{background:rgba(0,0,0,.18)}
  /* OS-window style resize: edges + corners, cursor shows on hover */
  .gh{position:absolute; z-index:3}
  .gh-n{top:-4px; left:10px; right:10px; height:9px; cursor:ns-resize}
  .gh-s{bottom:-4px; left:10px; right:10px; height:9px; cursor:ns-resize}
  .gh-e{right:-4px; top:10px; bottom:10px; width:9px; cursor:ew-resize}
  .gh-w{left:-4px; top:10px; bottom:10px; width:9px; cursor:ew-resize}
  .gh-ne{top:-5px; right:-5px; width:14px; height:14px; cursor:nesw-resize}
  .gh-sw{bottom:-5px; left:-5px; width:14px; height:14px; cursor:nesw-resize}
  .gh-nw{top:-5px; left:-5px; width:14px; height:14px; cursor:nwse-resize}
  .gh-se{bottom:-5px; right:-5px; width:14px; height:14px; cursor:nwse-resize}
  /* rectangle being drawn */
  .group-preview{position:absolute; z-index:5; border:2px dashed var(--accent); background:var(--accent-soft); border-radius:14px; pointer-events:none}
  #board.drawing{cursor:crosshair}
  #board.drawing .note, #board.drawing .group{cursor:crosshair}
  .note{z-index:2}

  /* ---------- connections (wires between notes) ---------- */
  #wires{position:absolute; top:0; left:0; width:100%; height:100%; overflow:visible; pointer-events:none; z-index:0}
  .wire{fill:none; stroke:var(--wire); stroke-width:2.5; stroke-linecap:round; pointer-events:none; transition:stroke .12s, stroke-width .12s}
  .wire.lit{stroke:var(--accent); stroke-width:3.5}
  .wire.temp{stroke:var(--accent); stroke-dasharray:6 7; opacity:.85}
  .wire-hit{fill:none; stroke:transparent; stroke-width:18; pointer-events:stroke; cursor:pointer}
  #wireDel{
    position:absolute; z-index:60; width:22px; height:22px; margin:-11px 0 0 -11px;
    border-radius:50%; background:var(--surface); border:1px solid var(--border);
    color:var(--danger); font-size:12px; line-height:20px; text-align:center; cursor:pointer;
    box-shadow:var(--shadow); user-select:none;
  }
  #wireDel:hover{background:var(--danger); color:#fff; border-color:var(--danger)}

  /* ---------- complete drop zone (fades in over the composer while dragging) ---------- */
  #dropzone{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(10px);
    z-index:41; width:min(560px, calc(100% - 40px)); height:60px;
    border:1.5px dashed rgba(52,199,89,.55); border-radius:18px;
    background:rgba(52,199,89,.12);
    -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    display:flex; align-items:center; justify-content:center; gap:9px;
    color:var(--good-dark); font-weight:600; font-size:14px; text-align:center;
    pointer-events:none; user-select:none; opacity:0;
    transition:opacity .22s ease, transform .22s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  #dropzone .ico{font-size:22px; line-height:1}
  #dropzone.hot{
    background:rgba(52,199,89,.85); color:#fff; border-color:rgba(52,199,89,.9); border-style:solid;
    box-shadow:0 12px 30px rgba(52,199,89,.4);
  }
  /* smooth cross-fade: dock slides down/out, drop zone rises in — same spot */
  body.holding #dock{ opacity:0; transform:translateX(-50%) translateY(10px); pointer-events:none; }
  body.holding #dropzone{ opacity:1; transform:translateX(-50%) translateY(0); }
  body.on-completed #dock{display:none}

  /* ---------- bottom dock: tool button + composer (Figma-style) ---------- */
  #dock{
    position:fixed; left:50%; bottom:22px; transform:translateX(-50%);
    z-index:40; display:flex; gap:10px; align-items:flex-end;
    transition:opacity .22s ease, transform .22s ease;
  }
  .tool-btn{
    flex:none; width:46px; height:46px; border-radius:14px; cursor:pointer; color:var(--ink);
    background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd); box-shadow:var(--glass-shadow);
    font-size:18px; display:flex; align-items:center; justify-content:center; transition:.15s;
  }
  .tool-btn:hover{background:var(--glass-fill-h)}
  .tool-btn.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  #composer{
    width:min(520px, calc(100vw - 96px));
    display:flex; gap:10px; align-items:flex-end;
    background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd); border-radius:18px;
    padding:10px 10px 10px 12px; box-shadow:var(--glass-shadow);
    transition:background-color .25s ease, border-color .25s ease;
  }
  /* color chooser for the task about to be created */
  #composer .color-dot{
    flex:none; width:30px; height:30px; border-radius:50%; cursor:pointer; padding:0;
    border:2px solid var(--surface); box-shadow:0 0 0 1px var(--border); align-self:center;
    transition:transform .1s;
  }
  #composer .color-dot:hover{transform:scale(1.1)}
  #colorPop{
    position:fixed; z-index:1000; border-radius:14px; padding:11px 13px;
    background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd); box-shadow:var(--glass-shadow);
  }
  #colorPop .ctx-title{font-size:11px; font-weight:700; color:var(--muted); margin-bottom:9px; text-transform:uppercase; letter-spacing:.5px}
  #colorPop .sw-row{display:flex; gap:9px}
  #colorPop .sw{
    width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid var(--surface);
    box-shadow:0 0 0 1px var(--border); transition:transform .1s;
  }
  #colorPop .sw:hover{transform:scale(1.18)}
  #colorPop .sw.sel{box-shadow:0 0 0 2px var(--ink)}
  #composer textarea{
    flex:1; border:none; outline:none; resize:none; font:inherit; font-size:15px;
    line-height:1.45; max-height:120px; background:transparent; color:var(--ink);
    padding:6px 0;
  }
  #composer .send{
    flex:none; width:40px; height:40px; border:none; border-radius:12px; cursor:pointer;
    background:var(--accent); color:#fff; font-size:17px; display:flex; align-items:center;
    justify-content:center; transition:.15s;
  }
  #composer .send:hover{filter:brightness(1.07)}
  #composer .send:disabled{opacity:.4; cursor:default}

  /* ---------- right-click accent menu ---------- */
  .popmenu{
    position:fixed; z-index:1000; border-radius:14px; padding:11px 13px;
    background:var(--glass); -webkit-backdrop-filter:var(--glass-blur); backdrop-filter:var(--glass-blur);
    border:1px solid var(--glass-brd); box-shadow:var(--glass-shadow);
  }
  .popmenu .ctx-title{font-size:11px; font-weight:700; color:var(--muted); margin-bottom:9px; text-transform:uppercase; letter-spacing:.5px}
  .popmenu .sw-row{display:flex; gap:9px}
  .popmenu .sw{
    width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid var(--surface);
    box-shadow:0 0 0 1px var(--border); transition:transform .1s;
  }
  .popmenu .sw:hover{transform:scale(1.18)}
  .popmenu .sw.sel{box-shadow:0 0 0 2px var(--ink)}
  .popmenu .ctx-edit{
    display:flex; align-items:center; gap:8px; width:100%; margin-top:11px;
    border:none; background:var(--glass-fill); color:var(--ink);
    padding:8px 10px; border-radius:9px; cursor:pointer; font:inherit; font-size:13px; font-weight:600;
  }
  .popmenu .ctx-edit:hover{background:var(--glass-fill-h)}
  .popmenu .ctx-del{
    display:flex; align-items:center; gap:8px; width:100%; margin-top:7px;
    border:none; background:var(--glass-fill); color:var(--danger);
    padding:8px 10px; border-radius:9px; cursor:pointer; font:inherit; font-size:13px; font-weight:600;
  }
  .popmenu .ctx-del:hover{background:var(--danger); color:#fff}
  .popmenu .ctx-time-title{margin-top:13px}
  .popmenu .ctx-time{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .popmenu .ctx-time-total{font-size:15px; font-weight:800; color:var(--ink)}
  .popmenu .ctx-time-add{display:flex; gap:6px}
  .popmenu .ctx-time-field{
    position:relative; display:flex; align-items:stretch;
    border:1px solid var(--glass-brd); background:var(--glass-fill);
    border-radius:8px; overflow:hidden; transition:border-color .12s;
  }
  .popmenu .ctx-time-field:focus-within{border-color:var(--accent, #64748b)}
  .popmenu .ctx-time-input{
    width:52px; border:none; background:transparent;
    color:var(--ink); padding:6px 4px 6px 9px; font:inherit; font-size:13px;
  }
  .popmenu .ctx-time-input:focus{outline:none}
  /* hide the ugly native spinners */
  .popmenu .ctx-time-input::-webkit-outer-spin-button,
  .popmenu .ctx-time-input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .popmenu .ctx-time-input{ -moz-appearance:textfield; appearance:textfield; }
  /* custom chevron steppers */
  .popmenu .ctx-time-steps{
    display:flex; flex-direction:column; width:20px; flex:none;
    border-left:1px solid var(--glass-brd);
  }
  .popmenu .ctx-step{
    flex:1; display:flex; align-items:center; justify-content:center;
    border:none; padding:0; cursor:pointer; color:var(--muted);
    background:var(--glass-fill); transition:background .1s, color .1s;
  }
  .popmenu .ctx-step:hover{ color:var(--ink); background:var(--glass-fill-h); }
  .popmenu .ctx-step:active{ color:var(--accent, #64748b); }
  .popmenu .ctx-step.up{ border-bottom:1px solid var(--glass-brd); }
  .popmenu .ctx-step svg{ display:block; }
  .popmenu .ctx-time-btn{
    border:none; background:var(--ink); color:var(--surface); cursor:pointer;
    border-radius:8px; padding:6px 12px; font:inherit; font-size:13px; font-weight:700;
  }
  .popmenu .ctx-time-btn:hover{opacity:.85}

  /* ---------- completed view ---------- */
  #completedView{overflow:auto; padding:74px 26px 80px}
  .done-head{max-width:1100px; margin:0 auto 18px; display:flex; align-items:baseline; gap:12px}
  .done-head h2{margin:0; font-size:20px}
  .done-head .count{color:var(--muted); font-size:14px}
  .grid{
    max-width:1100px; margin:0 auto;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:16px;
  }
  .btn{
    border:1px solid var(--border); background:var(--chip); color:var(--ink);
    padding:8px 13px; border-radius:9px; cursor:pointer; font-size:13px; font-weight:600;
    display:inline-flex; align-items:center; justify-content:center; gap:7px; transition:.15s;
  }
  .btn:hover{background:var(--chip-hover)}
  .done-card{
    background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0 14px 14px;
    box-shadow:0 2px 6px rgba(0,0,0,.05); display:flex; flex-direction:column; gap:10px; overflow:hidden;
  }
  .done-card .cap{height:6px; margin:0 -14px 12px; background:var(--accent,#94a3b8)}
  .done-card .txt{font-size:14px; line-height:1.45; color:var(--muted); text-decoration:line-through; word-break:break-word; white-space:pre-wrap}
  .done-card .when{font-size:11px; color:var(--muted)}
  .done-card .done-subs{display:flex; flex-direction:column; gap:3px}
  .done-card .done-subs-head{font-size:10.5px; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--muted); margin-bottom:1px}
  .done-card .done-sub{display:flex; align-items:flex-start; gap:7px; font-size:12.5px; line-height:1.4; color:var(--ink); word-break:break-word}
  .done-card .done-sub .tick{flex:none; color:var(--accent); font-size:11px; line-height:1.55}
  .done-card .done-sub.done .t{text-decoration:line-through; text-decoration-color:var(--accent); opacity:.55}
  .done-card .row{display:flex; gap:8px; margin-top:2px}
  .done-card .row .btn{flex:1; justify-content:center; padding:7px}
  .undo{color:var(--accent)}
  .del:hover{background:rgba(239,68,68,.12); border-color:rgba(239,68,68,.45); color:var(--danger)}
  .empty-done{max-width:1100px; margin:60px auto; text-align:center; color:var(--muted)}
  .empty-done .big{font-size:40px; opacity:.4; margin-bottom:8px}

  .toast{
    position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--toast-bg); color:var(--toast-fg); padding:10px 18px; border-radius:10px; font-size:13px;
    opacity:0; pointer-events:none; transition:.25s; z-index:100; box-shadow:var(--shadow);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* ---------- small screens / phones ---------- */
  @media (max-width:640px){
    #headerBar{top:10px; left:10px; padding:7px 9px 7px 12px}
    #headerBar h1{font-size:15px}
    #pagesBar{top:56px; left:10px; width:172px; max-height:52vh}
    #composer, #dropzone{bottom:14px}
  }
</style>
</head>
<body>
  <div id="headerBar" class="bubble">
    <div class="bar-top">
      <span class="logo"><svg viewBox="0 0 64 64" width="22" height="22" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="48" height="48" rx="9" fill="#FCD34D"/><path d="M56 40 L40 56 L40 45 a5 5 0 0 1 5 -5 Z" fill="#E5B93B"/><circle cx="25" cy="30" r="3.6" fill="#1F2937"/><circle cx="39" cy="30" r="3.6" fill="#1F2937"/><circle cx="26.3" cy="28.7" r="1.15" fill="#fff"/><circle cx="40.3" cy="28.7" r="1.15" fill="#fff"/><ellipse cx="18.5" cy="37.5" rx="3" ry="2" fill="#F9A66C"/><ellipse cx="45.5" cy="37.5" rx="3" ry="2" fill="#F9A66C"/><path d="M26 39 Q32 45 38 39" fill="none" stroke="#1F2937" stroke-width="2.4" stroke-linecap="round"/></svg></span>
      <h1>StickyTasks</h1>
      <button class="icon-btn" id="menuBtn" title="Menu">⋯</button>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabBoard" title="Board">Board</button>
      <button class="tab" id="tabDone" title="Completed">Done <span class="badge" id="doneBadge">0</span></button>
    </div>
    <div class="side-sep"></div>
    <div class="side-head"><span>Pages</span><button class="side-add" id="addPageBtn" title="New page">+</button></div>
    <div class="page-list" id="pageList"></div>
  </div>

  <input type="file" id="fileInput" accept="application/json,.json" hidden>
  <div id="menuPop" class="hidden"></div>

  <main id="board" class="view">
    <div class="hint" id="hint">
      <div class="big">🫧</div>
      <div>No tasks.<br>Type below to add one.</div>
    </div>
    <div id="world">
      <svg id="wires"></svg>
      <div id="wireDel" class="hidden" title="Unlink">✕</div>
    </div>
    <div id="dropzone"><span class="ico">✓</span><span>Drop to complete</span></div>
  </main>

  <section id="completedView" class="view hidden">
    <div class="done-head">
      <h2>✅ Completed</h2>
      <span class="count" id="doneCount"></span>
    </div>
    <div class="grid" id="doneGrid"></div>
  </section>

  <!-- chat-style composer -->
  <div id="dock">
    <button id="groupTool" class="tool-btn" title="Draw a group">▭</button>
    <div id="composer">
      <button id="composerColor" class="color-dot" title="Color"></button>
      <textarea id="composerInput" rows="1" placeholder="New task…"></textarea>
      <button id="sendBtn" class="send" title="Add">➤</button>
    </div>
  </div>

  <!-- color picker for the composer -->
  <div id="colorPop" class="hidden"></div>

  <!-- right-click menus (task / page) -->
  <div id="ctxMenu" class="popmenu hidden"></div>
  <div id="pageCtx" class="popmenu hidden"></div>
  <div id="groupPop" class="popmenu hidden"></div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const KEY = "floating-tasks.v1";
  const THEME_KEY = "floating-tasks.theme";
  // six curated accent colors that read well together
  const ACCENTS = ["#ef4444","#f59e0b","#10b981","#3b82f6","#8b5cf6","#ec4899"];

  // ---------------- theme (light / dark) ----------------
  function currentTheme(){
    let t = null;
    try{ t = localStorage.getItem(THEME_KEY); }catch(e){}
    if(t!=="dark" && t!=="light"){
      t = (window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
    }
    return t;
  }
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    const item = document.getElementById("themeItem");
    if(item) item.textContent = t==="dark" ? "☀️  Light" : "🌙  Dark";
  }
  function toggleTheme(){
    const t = document.documentElement.getAttribute("data-theme")==="dark" ? "light" : "dark";
    try{ localStorage.setItem(THEME_KEY, t); }catch(e){}
    applyTheme(t);
  }

  const board    = document.getElementById("board");
  const world    = document.getElementById("world");
  const completedView = document.getElementById("completedView");
  const dropzone = document.getElementById("dropzone");
  const composer = document.getElementById("composer");
  const hint     = document.getElementById("hint");
  const toastEl  = document.getElementById("toast");
  const ctxMenu  = document.getElementById("ctxMenu");
  const svg      = document.getElementById("wires");
  const wireDel  = document.getElementById("wireDel");
  const SVGNS    = "http://www.w3.org/2000/svg";

  const ACTIVE_KEY = "floating-tasks.active";
  const NEWCOLOR_KEY = "floating-tasks.newcolor";
  let pages = [];                            // shared: [{id,name,tasks,completed,connections}]
  let seq = 1;
  let currentPageId = null;                  // which page THIS person is viewing (local)
  let state = null;                          // always points at the current page object
  let colorIx = 0;
  let composerAccent = ACCENTS[3];           // color applied to the next task created
  let pan   = { x:0, y:0 };                  // board scroll offset — per-person, per-page
  let clientId = "c_" + Math.random().toString(36).slice(2,10);
  let live = false;                          // true once connected to the shared server
  let es = null;                             // EventSource for live updates
  function panKey(){ return "floating-tasks.pan." + (currentPageId || "main"); }
  function pageById(id){ return pages.find(p => p.id === id) || null; }
  function pid(){ return "p" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  // ---------------- data helpers ----------------
  function nextAccent(){ return ACCENTS[(colorIx++) % ACCENTS.length]; }
  // collision-safe id so different people never generate the same one
  function uid(){ return "t" + Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
  function findTask(id){ return state.tasks.find(x=>x.id===id); }
  function noteEl(id){ return world.querySelector('.note[data-id="'+id+'"]'); }
  function onCompletedView(){ return !completedView.classList.contains("hidden"); }

  function normalizePage(p, i){
    p = p || {};
    const normSubs = s => (s||[]).map(x => ({ id: x.id || uid(), text: x.text || "", done: !!x.done }));
    const tasks = (p.tasks||[]).map(t => ({
      id:   t.id || uid(),
      text: t.text || "",
      x:    typeof t.x === "number" ? t.x : 24,
      y:    typeof t.y === "number" ? t.y : 24,
      rot:  typeof t.rot === "number" ? t.rot : 0,
      accent: t.accent || t.color || nextAccent(),
      subs: normSubs(t.subs),
      time: typeof t.time === "number" && t.time > 0 ? t.time : 0   // total hours worked
    }));
    const completed = (p.completed||[]).map(t => ({
      id:   t.id || uid(),
      text: t.text || "",
      x: t.x, y: t.y, rot: t.rot || 0,
      accent: t.accent || t.color || "#94a3b8",
      ts: t.ts,
      time: typeof t.time === "number" && t.time > 0 ? t.time : 0,
      subs: normSubs(t.subs)
    }));
    const connections = (p.connections||[])
      .map(c => ({ id: c.id || uid(), a: c.a, b: c.b }))
      .filter(c => c.a && c.b && c.a !== c.b);
    const groups = (p.groups||[]).map(g => ({
      id: g.id || uid(), name: g.name || "Group", color: g.color || "#64748b",
      x: g.x||0, y: g.y||0, w: g.w||360, h: g.h||260
    }));
    return { id: p.id || pid(), name: p.name || "Untitled",
             color: p.color || ACCENTS[(i||0) % ACCENTS.length], tasks, completed, connections, groups };
  }
  // accept either the new {pages:[…]} shape or an old single-board file
  function normalizeDoc(d){
    d = d || {};
    let pgs;
    if(d.pages && d.pages.length){ pgs = d.pages.map(normalizePage); }
    else { pgs = [ normalizePage({ id:"p_main", name:"Main", tasks:d.tasks, completed:d.completed, connections:d.connections }) ]; }
    if(!pgs.length) pgs = [ normalizePage({ id:"p_main", name:"Main" }) ];
    return { pages: pgs, seq: d.seq || 1 };
  }
  // load a whole document into the client and pick which page to show
  function ingestDoc(d){
    const nd = normalizeDoc(d);
    pages = nd.pages; seq = nd.seq;
    const want = loadActivePage();
    currentPageId = (want && pageById(want)) ? want : pages[0].id;
    state = pageById(currentPageId);
    colorIx = state.tasks.length + state.completed.length;
  }
  function loadActivePage(){ try{ return localStorage.getItem(ACTIVE_KEY); }catch(e){ return null; } }
  function saveActivePage(){ try{ localStorage.setItem(ACTIVE_KEY, currentPageId); }catch(e){} }

  // apply an op to a page's DATA only (no DOM); mirrors the server's logic.
  // used for pages the user isn't currently looking at.
  function mutate(pg, op){
    const find = (lst,id)=>lst.find(x=>x.id===id);
    switch(op.type){
      case "add": if(op.task && !find(pg.tasks, op.task.id)) pg.tasks.push(op.task); break;
      case "move": { const t=find(pg.tasks,op.id); if(t){ t.x=op.x; t.y=op.y; } break; }
      case "text": { const t=find(pg.tasks,op.id); if(t) t.text=op.text||""; break; }
      case "accent": { const t=find(pg.tasks,op.id); if(t) t.accent=op.accent; break; }
      case "del": pg.tasks=pg.tasks.filter(x=>x.id!==op.id);
                  pg.connections=pg.connections.filter(c=>c.a!==op.id&&c.b!==op.id); break;
      case "complete": { const t=find(pg.tasks,op.id); if(t){ pg.tasks=pg.tasks.filter(x=>x.id!==op.id); t.ts=op.ts; pg.completed.unshift(t); } break; }
      case "undo": { const i=pg.completed.findIndex(x=>x.id===op.id); if(i>=0){ const t=pg.completed.splice(i,1)[0]; delete t.ts; if(op.x!=null)t.x=op.x; if(op.y!=null)t.y=op.y; pg.tasks.push(t); } break; }
      case "delDone": pg.completed=pg.completed.filter(x=>x.id!==op.id);
                      pg.connections=pg.connections.filter(c=>c.a!==op.id&&c.b!==op.id); break;
      case "connect": { const c=op.conn; if(c&&c.a&&c.b&&c.a!==c.b&&!pg.connections.some(k=>(k.a===c.a&&k.b===c.b)||(k.a===c.b&&k.b===c.a))) pg.connections.push(c); break; }
      case "disconnect": pg.connections=pg.connections.filter(c=>c.id!==op.id); break;
      case "subs": { const t=find(pg.tasks,op.id); if(t) t.subs=op.subs||[]; break; }
      case "time": { const t=find(pg.tasks,op.id); if(t) t.time = typeof op.time==="number" ? op.time : 0; break; }
      case "addGroup": { if(!pg.groups) pg.groups=[]; const g=op.group; if(g&&!find(pg.groups,g.id)) pg.groups.push(g); break; }
      case "groupBox": { const g=find(pg.groups||[],op.id); if(g){ g.x=op.x; g.y=op.y; g.w=op.w; g.h=op.h; } break; }
      case "renameGroup": { const g=find(pg.groups||[],op.id); if(g) g.name=op.name||""; break; }
      case "groupColor": { const g=find(pg.groups||[],op.id); if(g) g.color=op.color; break; }
      case "delGroup": pg.groups=(pg.groups||[]).filter(g=>g.id!==op.id); break;
    }
  }

  // ---------------- view offset (local to each person) ----------------
  function loadPan(){
    try{ const p = JSON.parse(localStorage.getItem(panKey()) || "null");
         if(p && typeof p.x === "number") return { x:p.x, y:p.y }; }catch(e){}
    return { x:0, y:0 };
  }
  function savePan(){ try{ localStorage.setItem(panKey(), JSON.stringify(pan)); }catch(e){} }

  // ---------------- persistence / sync ----------------
  function persistLocal(){ try{ localStorage.setItem(KEY, JSON.stringify({ pages, seq })); }catch(e){} }
  // send one change: apply it locally (caller already did), keep a backup, push to the server
  const PAGE_OPS = { addPage:1, delPage:1, renamePage:1, pageColor:1, replace:1, reorderPages:1 };
  function emitOp(op){
    if(!op.page && !PAGE_OPS[op.type]) op.page = currentPageId;   // tag task ops with their page
    op.origin = clientId;
    persistLocal();
    if(live){
      fetch("/api/op", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(op) })
        .catch(()=>{});
    }
  }

  // don't let an incoming change yank the board while THIS person is mid-action
  let interacting = 0;
  const remoteQueue = [];
  function beginInteract(){ interacting++; }
  function endInteract(){ if(interacting>0) interacting--; if(interacting===0) flushRemote(); }
  function flushRemote(){ while(remoteQueue.length) applyRemote(remoteQueue.shift()); }

  function renderAll(){ renderBoard(); renderCompleted(); updateBadges(); }

  // apply a change that came from someone else
  function applyRemote(op){
    if(op.origin === clientId) return;              // ignore the echo of our own change
    if(interacting > 0){ remoteQueue.push(op); return; }

    // ----- page (workspace) changes -----
    if(op.type === "addPage"){
      if(op.page && !pageById(op.page.id)){ pages.push(normalizePage(op.page)); renderSidebar(); }
      persistLocal(); return;
    }
    if(op.type === "renamePage"){
      const p = pageById(op.id); if(p){ p.name = op.name || "Untitled"; renderSidebar(); }
      persistLocal(); return;
    }
    if(op.type === "pageColor"){
      const p = pageById(op.id); if(p){ p.color = op.color; renderSidebar(); }
      persistLocal(); return;
    }
    if(op.type === "delPage"){
      pages = pages.filter(p => p.id !== op.id);
      if(!pages.length) pages.push(normalizePage({ id:"p_main", name:"Main" }));
      try{ localStorage.removeItem("floating-tasks.pan." + op.id); }catch(e){}
      if(!pageById(currentPageId)){        // the page we were on was deleted elsewhere
        currentPageId = pages[0].id; state = pageById(currentPageId);
        saveActivePage(); pan = loadPan(); renderAll(); applyPan();
      }
      renderSidebar(); persistLocal(); return;
    }
    if(op.type === "reorderPages"){
      const order = op.order || [];
      pages.sort((a,b)=> (order.indexOf(a.id)+1 || 1e9) - (order.indexOf(b.id)+1 || 1e9));
      renderSidebar(); persistLocal(); return;
    }
    if(op.type === "replace"){
      ingestDoc(op.doc); pan = loadPan(); renderSidebar(); renderAll(); applyPan();
      persistLocal(); return;
    }

    // ----- task changes (scoped to a page) -----
    const pg = pageById(op.page);
    if(!pg) return;
    if(pg !== state){ mutate(pg, op); persistLocal(); return; }   // a page we aren't viewing: data only

    mutate(state, op);                                            // current page: data + DOM
    switch(op.type){
      case "move": { const el = noteEl(op.id); if(el){ el.style.left = op.x+"px"; el.style.top = op.y+"px"; } renderWires(); break; }
      case "text": { const el = noteEl(op.id); const t = findTask(op.id); if(el){ const tx = el.querySelector(".txt"); if(tx.getAttribute("contenteditable")!=="true") tx.textContent = op.text; if(t) updateTimeBadge(el, t); } break; }
      case "accent": { const el = noteEl(op.id); if(el) el.style.setProperty("--accent", op.accent); break; }
      case "time": { const el = noteEl(op.id); const t = findTask(op.id); if(el && t) updateTimeBadge(el, t); if(ctxTargetId === op.id){ const tot = ctxMenu.querySelector(".ctx-time-total"); if(tot && t) tot.textContent = fmtHours(t.time); } break; }
      default: renderAll();     // add / del / complete / undo / delDone / connect / disconnect
    }
    persistLocal();
  }

  // open the live stream; resolves true if we reached the shared server, false if not
  function connectLive(){
    return new Promise((resolve)=>{
      let settled = false, ev;
      try{ ev = new EventSource("/api/events"); }
      catch(e){ resolve(false); return; }
      es = ev;
      ev.addEventListener("snapshot", e=>{
        const first = !settled;
        ingestDoc(JSON.parse(e.data));
        if(first){ settled = true; live = true; resolve(true); }
        else { pan = loadPan(); renderSidebar(); renderAll(); applyPan(); }   // re-sync after a dropped connection
      });
      ev.addEventListener("op", e=>{ try{ applyRemote(JSON.parse(e.data)); }catch(_){} });
      ev.addEventListener("presence", e=>{ try{ updatePresence(JSON.parse(e.data).count); }catch(_){} });
      ev.onerror = ()=>{ if(!settled){ settled = true; try{ ev.close(); }catch(_){} es = null; resolve(false); } };
      setTimeout(()=>{ if(!settled){ settled = true; try{ ev.close(); }catch(_){} es = null; resolve(false); } }, 2000);
    });
  }

  let presenceCount = 0;
  // one compact line: "🟢 Live (4)" when others are connected, "🟢 Live" alone, or "🌐 Local"
  function renderStatus(){
    const el = document.getElementById("status");
    if(!el) return;
    if(live){
      el.textContent = presenceCount > 0 ? "🟢 Live (" + presenceCount + ")" : "🟢 Live";
      el.title = presenceCount > 0 ? presenceCount + " connected right now" : "Shared — you're the only one here";
    } else {
      el.textContent = "🌐 Local";
      el.title = "Not connected to a shared server";
    }
  }
  function updatePresence(count){ presenceCount = count || 0; renderStatus(); }
  function updateStatus(){ renderStatus(); }

  // ---------------- helpers ----------------
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>toastEl.classList.remove("show"), 1500);
  }
  function fmt(ts){
    if(!ts) return "";
    return new Date(ts).toLocaleString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
  }
  function escapeHtml(s){
    return s.replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  }
  function refreshHint(){ hint.style.display = state.tasks.length ? "none" : "block"; }

  // ---------------- collision-aware placement ----------------
  function rectDist(a,b){
    const dx = Math.max(b.x - (a.x+a.w), a.x - (b.x+b.w), 0);
    const dy = Math.max(b.y - (a.y+a.h), a.y - (b.y+b.h), 0);
    return Math.hypot(dx,dy);
  }
  // reserved on-screen UI (drop zone, composer), converted to WORLD coordinates
  function reservedRects(){
    const b = board.getBoundingClientRect();
    const out = [];
    [dropzone, composer].forEach(el=>{
      if(!el || (el===composer && composer.style.display==="none")) return;
      const r = el.getBoundingClientRect();
      if(r.width===0 && r.height===0) return;
      out.push({ x:r.left-b.left-pan.x, y:r.top-b.top-pan.y, w:r.width, h:r.height });
    });
    return out;
  }
  // pick a spot near the CENTER of the current view, clear of other notes / UI,
  // spiralling outward only if the middle is occupied — so new tasks are always visible
  function findSpot(w=208, h=150){
    const b = board.getBoundingClientRect();
    const cx = -pan.x + b.width/2  - w/2;      // center of the visible board (world coords)
    const cy = -pan.y + b.height/2 - h/2;
    const obstacles = state.tasks.map(t=>({x:t.x, y:t.y, w:w, h:h})).concat(reservedRects());
    const clearAt = (x,y)=>{
      const cand = { x, y, w, h };
      for(const o of obstacles){ if(rectDist(cand, o) < 20) return false; }   // ~20px breathing room
      return true;
    };
    if(clearAt(cx, cy)) return { x:Math.round(cx), y:Math.round(cy) };
    const step = 46;
    for(let ring=1; ring<48; ring++){
      const count = ring*8;
      for(let a=0; a<count; a++){
        const ang = (a/count) * Math.PI * 2;
        const x = cx + Math.cos(ang) * ring * step;
        const y = cy + Math.sin(ang) * ring * step;
        if(clearAt(x, y)) return { x:Math.round(x), y:Math.round(y) };
      }
    }
    return { x:Math.round(cx), y:Math.round(cy) };   // give up gracefully — still centered
  }
  // keep notes within a large world so they can never be lost for good
  function clampInto(t){
    const LIM = 6000;
    t.x = Math.max(-LIM, Math.min(t.x, LIM));
    t.y = Math.max(-LIM, Math.min(t.y, LIM));
  }
  function applyPan(){
    world.style.transform = "translate(" + pan.x + "px," + pan.y + "px)";
    board.style.backgroundPosition = (pan.x - 11) + "px " + (pan.y - 11) + "px";
  }
  function centerView(){ pan.x = 0; pan.y = 0; applyPan(); savePan(); }

  // ---------------- connections (visual links between notes) ----------------
  // a note's box, and a point on its border toward a target — wires leave any side
  function noteBox(id){
    const el = world.querySelector('.note[data-id="'+id+'"]');
    if(!el) return null;
    return { w: el.offsetWidth, h: el.offsetHeight,
             cx: el.offsetLeft + el.offsetWidth/2, cy: el.offsetTop + el.offsetHeight/2 };
  }
  function edgeToward(box, tx, ty){
    const dx = tx - box.cx, dy = ty - box.cy;
    if(!dx && !dy) return { x: box.cx, y: box.cy };
    const s = 0.5 / Math.max(Math.abs(dx)/box.w, Math.abs(dy)/box.h);
    return { x: box.cx + dx*s, y: box.cy + dy*s };
  }
  // cute rounded curve between two points; returns the path data + its midpoint
  function curve(p0, p1){
    const mx=(p0.x+p1.x)/2, my=(p0.y+p1.y)/2;
    const dx=p1.x-p0.x, dy=p1.y-p0.y;
    const len=Math.hypot(dx,dy)||1;
    const off=Math.min(len*0.22, 48);
    const cx=mx+(-dy/len)*off, cy=my+(dx/len)*off;   // bow perpendicular to the line
    const d="M"+p0.x+" "+p0.y+" Q"+cx+" "+cy+" "+p1.x+" "+p1.y;
    const mid={ x:0.25*p0.x+0.5*cx+0.25*p1.x, y:0.25*p0.y+0.5*cy+0.25*p1.y };
    return { d, mid };
  }
  function anchors(aId, bId){
    const a = noteBox(aId), b = noteBox(bId);
    if(!a || !b) return null;
    return { p0: edgeToward(a, b.cx, b.cy), p1: edgeToward(b, a.cx, a.cy) };
  }
  let hideDelTimer = null;
  function renderWires(){
    // drop the old paths (keep the persistent temp wire if a link is being drawn)
    [...svg.querySelectorAll(".wire, .wire-hit")].forEach(n=>{ if(!n.classList.contains("temp")) n.remove(); });
    const onBoard = new Set(state.tasks.map(t=>t.id));
    state.connections.forEach(c=>{
      if(!onBoard.has(c.a) || !onBoard.has(c.b)) return;   // an endpoint is completed -> hide, but keep the record
      const a = anchors(c.a, c.b);
      if(!a) return;
      const { d, mid } = curve(a.p0, a.p1);
      const line = document.createElementNS(SVGNS, "path");
      line.setAttribute("d", d); line.setAttribute("class", "wire");
      line.dataset.id = c.id; line.dataset.a = c.a; line.dataset.b = c.b;
      const hit = document.createElementNS(SVGNS, "path");
      hit.setAttribute("d", d); hit.setAttribute("class", "wire-hit");
      hit.addEventListener("mouseenter", ()=>{
        clearTimeout(hideDelTimer);
        line.classList.add("lit");
        wireDel.style.left = mid.x + "px"; wireDel.style.top = mid.y + "px";
        wireDel.classList.remove("hidden");
        wireDel._id = c.id; wireDel._line = line;
      });
      hit.addEventListener("mouseleave", scheduleHideDel);
      svg.appendChild(line); svg.appendChild(hit);
    });
  }
  function scheduleHideDel(){ hideDelTimer = setTimeout(hideDel, 200); }
  function hideDel(){
    wireDel.classList.add("hidden");
    if(wireDel._line) wireDel._line.classList.remove("lit");
    wireDel._id = null; wireDel._line = null;
  }
  function addConnection(a, b){
    if(a === b) return;
    if(state.connections.some(c => (c.a===a&&c.b===b) || (c.a===b&&c.b===a))){ toast("Already linked"); return; }
    const conn = { id: uid(), a, b };
    state.connections.push(conn);
    emitOp({ type:"connect", conn }); renderWires(); toast("Linked");
  }
  function removeConnection(id){
    state.connections = state.connections.filter(c => c.id !== id);
    hideDel(); emitOp({ type:"disconnect", id }); renderWires();
  }
  function pruneConnections(taskId){
    state.connections = state.connections.filter(c => c.a !== taskId && c.b !== taskId);
  }

  // drag from a note's edge handle onto another note to link them
  let connecting = null;
  function startConnect(e, sourceId){
    if(e.button !== 0) return;
    e.stopPropagation(); e.preventDefault();
    hideCtx();
    const handle = e.currentTarget;
    connecting = { source: sourceId, pointerId: e.pointerId };
    beginInteract();
    try{ handle.setPointerCapture(e.pointerId); }catch(_){}
    const temp = document.createElementNS(SVGNS, "path");
    temp.setAttribute("class", "wire temp");
    svg.appendChild(temp);

    const targetAt = (cx, cy)=>{
      const el = document.elementFromPoint(cx, cy);
      const note = el && el.closest ? el.closest(".note") : null;
      const id = note && note.dataset.id;
      return (id && id !== sourceId) ? id : null;
    };
    const highlight = (id)=>{
      world.querySelectorAll(".note.link-target").forEach(n=>n.classList.remove("link-target"));
      if(id){ const n = world.querySelector('.note[data-id="'+id+'"]'); if(n) n.classList.add("link-target"); }
    };
    const move = ev=>{
      const src = noteBox(sourceId); if(!src) return;
      const tid = targetAt(ev.clientX, ev.clientY);
      highlight(tid);
      if(tid){
        const a = anchors(sourceId, tid);
        if(a) temp.setAttribute("d", curve(a.p0, a.p1).d);
      }else{
        const b = board.getBoundingClientRect();
        const end = { x: ev.clientX - b.left - pan.x, y: ev.clientY - b.top - pan.y };
        temp.setAttribute("d", curve(edgeToward(src, end.x, end.y), end).d);
      }
    };
    const finish = ev=>{
      const tid = targetAt(ev.clientX, ev.clientY);
      try{ handle.releasePointerCapture(connecting.pointerId); }catch(_){}
      handle.removeEventListener("pointermove", move);
      handle.removeEventListener("pointerup", finish);
      handle.removeEventListener("pointercancel", finish);
      temp.remove(); highlight(null); connecting = null;
      endInteract();
      if(tid) addConnection(sourceId, tid);
    };
    handle.addEventListener("pointermove", move);
    handle.addEventListener("pointerup", finish);
    handle.addEventListener("pointercancel", finish);
  }

  // ---------------- notes ----------------
  // touch "selection": tapping a note reveals its controls (✕ / link dot) and
  // highlights it, since there is no hover on touch screens. One at a time.
  function activateNote(el){ clearActivated(); if(el) el.classList.add("activated"); }
  function clearActivated(){ world.querySelectorAll(".note.activated").forEach(n=>n.classList.remove("activated")); }

  // ---------------- background groups ----------------
  function groupEl(id){ return world.querySelector('.group[data-id="'+id+'"]'); }
  // tasks whose box currently overlaps/touches the group rectangle
  function tasksTouching(g){
    return state.tasks.filter(t=>{
      const el = noteEl(t.id);
      const w = el ? el.offsetWidth : 200, h = el ? el.offsetHeight : 92;
      return t.x < g.x + g.w && t.x + w > g.x && t.y < g.y + g.h && t.y + h > g.y;
    });
  }
  function renderGroups(){
    world.querySelectorAll(".group").forEach(n=>n.remove());
    (state.groups||[]).forEach(g=>{
      const el = document.createElement("div");
      el.className = "group"; el.dataset.id = g.id;
      el.style.left = g.x+"px"; el.style.top = g.y+"px";
      el.style.width = g.w+"px"; el.style.height = g.h+"px";
      el.style.background = hexToRgba(g.color, .1);
      el.style.border = "1px solid " + hexToRgba(g.color, .4);
      el.innerHTML =
        '<div class="group-head">' +
          '<span class="group-name"></span>' +
          '<button class="group-btn g-rename" title="Rename">✎</button>' +
          '<button class="group-btn g-color" title="Color">●</button>' +
          '<button class="group-btn g-del" title="Delete group">×</button>' +
        '</div>' +
        '<div class="gh gh-n"></div><div class="gh gh-s"></div><div class="gh gh-e"></div><div class="gh gh-w"></div>' +
        '<div class="gh gh-ne"></div><div class="gh gh-nw"></div><div class="gh gh-se"></div><div class="gh gh-sw"></div>';
      el.querySelector(".group-head").style.background = hexToRgba(g.color, .22);
      el.querySelector(".group-name").textContent = g.name;
      el.querySelectorAll(".group-btn").forEach(b=>b.addEventListener("pointerdown", e=>e.stopPropagation()));
      el.querySelector(".g-del").addEventListener("click", e=>{ e.stopPropagation(); deleteGroup(g.id); });
      el.querySelector(".g-color").addEventListener("click", e=>{ e.stopPropagation(); showGroupColor(e.clientX, e.clientY, g.id); });
      el.querySelector(".g-rename").addEventListener("click", e=>{ e.stopPropagation(); renameGroupInline(el, g); });
      el.querySelector(".group-head").addEventListener("dblclick", e=>{
        if(e.target.closest(".group-btn")) return;    // not the little action buttons
        e.stopPropagation(); renameGroupInline(el, g);
      });
      attachGroupDrag(el.querySelector(".group-head"), g);
      ["n","s","e","w","ne","nw","se","sw"].forEach(dir=>{
        el.querySelector(".gh-"+dir).addEventListener("pointerdown", e=>startResize(e, g, dir));
      });
      world.appendChild(el);
    });
  }
  // drag the header -> move the group AND every task overlapping it (relative positions kept)
  function attachGroupDrag(head, g){
    let sx, sy, gx, gy, active=false, moved=false, items=[];
    head.addEventListener("pointerdown", e=>{
      if(e.button!==0 || e.target.closest(".group-btn") || head.querySelector(".group-name-input")) return;
      active=true; moved=false; sx=e.clientX; sy=e.clientY; gx=g.x; gy=g.y;
      items = tasksTouching(g).map(t=>({ t, x:t.x, y:t.y, el:noteEl(t.id) }));
      beginInteract(); head.classList.add("dragging");
      try{ head.setPointerCapture(e.pointerId); }catch(_){}
    });
    head.addEventListener("pointermove", e=>{
      if(!active) return;
      const dx=e.clientX-sx, dy=e.clientY-sy;
      if(!moved && Math.hypot(dx,dy)<4) return;
      moved=true;
      const el=groupEl(g.id);
      el.style.left=(gx+dx)+"px"; el.style.top=(gy+dy)+"px";
      items.forEach(it=>{ if(it.el){ it.el.style.left=(it.x+dx)+"px"; it.el.style.top=(it.y+dy)+"px"; } });
      renderWires();
    });
    const end = e=>{
      if(!active) return; active=false; head.classList.remove("dragging");
      try{ head.releasePointerCapture(e.pointerId); }catch(_){}
      if(moved){
        const dx=e.clientX-sx, dy=e.clientY-sy;
        g.x=gx+dx; g.y=gy+dy;
        emitOp({ type:"groupBox", id:g.id, x:g.x, y:g.y, w:g.w, h:g.h });
        items.forEach(it=>{
          it.t.x=it.x+dx; it.t.y=it.y+dy; clampInto(it.t);
          if(it.el){ it.el.style.left=it.t.x+"px"; it.el.style.top=it.t.y+"px"; }
          emitOp({ type:"move", id:it.t.id, x:it.t.x, y:it.t.y });   // tasks stay independent
        });
        renderWires();
      }
      endInteract();
    };
    head.addEventListener("pointerup", end);
    head.addEventListener("pointercancel", end);
  }
  // resize from any edge/corner, like an OS window
  function startResize(e, g, dir){
    e.stopPropagation(); e.preventDefault();
    const el = groupEl(g.id);
    const sx=e.clientX, sy=e.clientY, x0=g.x, y0=g.y, w0=g.w, h0=g.h, MIN=80;
    let box = { x:x0, y:y0, w:w0, h:h0 };
    beginInteract();
    const mv = ev=>{
      const dx=ev.clientX-sx, dy=ev.clientY-sy;
      let x=x0, y=y0, w=w0, h=h0;
      if(dir.indexOf("e")>=0) w=Math.max(MIN, w0+dx);
      if(dir.indexOf("s")>=0) h=Math.max(MIN, h0+dy);
      if(dir.indexOf("w")>=0){ w=Math.max(MIN, w0-dx); x=x0+(w0-w); }
      if(dir.indexOf("n")>=0){ h=Math.max(MIN, h0-dy); y=y0+(h0-h); }
      box={x,y,w,h};
      el.style.left=x+"px"; el.style.top=y+"px"; el.style.width=w+"px"; el.style.height=h+"px";
    };
    const up = ()=>{
      window.removeEventListener("pointermove", mv);
      window.removeEventListener("pointerup", up);
      g.x=box.x; g.y=box.y; g.w=box.w; g.h=box.h;
      emitOp({ type:"groupBox", id:g.id, x:g.x, y:g.y, w:g.w, h:g.h });
      endInteract();
    };
    window.addEventListener("pointermove", mv);
    window.addEventListener("pointerup", up);
  }
  function renameGroupInline(el, g){
    const head = el.querySelector(".group-head");
    const nameEl = head.querySelector(".group-name");
    const inp = document.createElement("input");
    inp.className = "group-name-input"; inp.value = g.name;
    head.replaceChild(inp, nameEl); inp.focus(); inp.select(); beginInteract();
    let done=false;
    const finish = save=>{ if(done) return; done=true;
      const v=inp.value.trim();
      if(save && v && v!==g.name){ g.name=v; emitOp({ type:"renameGroup", id:g.id, name:v }); }
      endInteract(); renderGroups(); };
    inp.addEventListener("pointerdown", e=>e.stopPropagation());
    inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){e.preventDefault();finish(true);} else if(e.key==="Escape"){e.preventDefault();finish(false);} });
    inp.addEventListener("blur", ()=>finish(true));
  }
  function deleteGroup(id){
    state.groups = (state.groups||[]).filter(g=>g.id!==id);
    emitOp({ type:"delGroup", id });
    const el = groupEl(id); if(el) el.remove();   // tasks are untouched
  }
  function createGroupAt(x, y, w, h){
    const g = { id: uid(), name:"Group", color: ACCENTS[((state.groups||[]).length) % ACCENTS.length], x, y, w, h };
    if(!state.groups) state.groups = [];
    state.groups.push(g);
    emitOp({ type:"addGroup", group:g });
    renderGroups();
  }
  // "square drawing tool": click the dock button, then drag on the board to draw a group
  let drawMode = false;
  function setDrawMode(on){
    drawMode = on;
    board.classList.toggle("drawing", on);
    document.getElementById("groupTool").classList.toggle("active", on);
  }
  function setupDraw(){
    board.addEventListener("pointerdown", e=>{
      if(!drawMode || e.button!==0) return;
      e.preventDefault(); e.stopPropagation();
      const b = board.getBoundingClientRect();
      const wx = e.clientX - b.left - pan.x, wy = e.clientY - b.top - pan.y;
      const prev = document.createElement("div"); prev.className = "group-preview"; world.appendChild(prev);
      beginInteract();
      const box = ev=>{
        const cx = ev.clientX - b.left - pan.x, cy = ev.clientY - b.top - pan.y;
        return { x:Math.min(wx,cx), y:Math.min(wy,cy), w:Math.abs(cx-wx), h:Math.abs(cy-wy) };
      };
      const mv = ev=>{ const r=box(ev); prev.style.left=r.x+"px"; prev.style.top=r.y+"px"; prev.style.width=r.w+"px"; prev.style.height=r.h+"px"; };
      const up = ev=>{
        window.removeEventListener("pointermove", mv); window.removeEventListener("pointerup", up);
        const r = box(ev); prev.remove(); endInteract(); setDrawMode(false);
        if(r.w > 24 && r.h > 24) createGroupAt(Math.round(r.x), Math.round(r.y), Math.round(r.w), Math.round(r.h));
      };
      window.addEventListener("pointermove", mv);
      window.addEventListener("pointerup", up);
    }, true);   // capture: run before pan / note handlers
  }
  const GROUP_COLORS = ACCENTS.concat(["#64748b"]);
  function showGroupColor(x, y, id){
    const g = (state.groups||[]).find(z=>z.id===id); if(!g) return;
    const el = document.getElementById("groupPop");
    el.innerHTML = '<div class="ctx-title">Group color</div><div class="sw-row"></div>';
    const row = el.querySelector(".sw-row");
    GROUP_COLORS.forEach(c=>{
      const s = document.createElement("div");
      s.className = "sw" + (c===g.color ? " sel" : ""); s.style.background = c;
      s.addEventListener("click", e=>{ e.stopPropagation(); g.color=c; emitOp({ type:"groupColor", id, color:c }); renderGroups(); hideGroupPop(); });
      row.appendChild(s);
    });
    el.classList.remove("hidden");
    const mw=el.offsetWidth, mh=el.offsetHeight;
    el.style.left=Math.min(x, innerWidth-mw-8)+"px"; el.style.top=Math.min(y, innerHeight-mh-8)+"px";
  }
  function hideGroupPop(){ document.getElementById("groupPop").classList.add("hidden"); }

  // ---------------- time tracking ----------------
  function emitTime(t){ emitOp({ type:"time", id:t.id, time:t.time }); }
  // "2.5h" / "1h" / "0h30m" style compact label
  function fmtHours(h){
    h = +h || 0;
    if(h <= 0) return "0h";
    const whole = Math.floor(h);
    const mins = Math.round((h - whole) * 60);
    if(mins === 0) return whole + "h";
    if(whole === 0) return mins + "m";
    return whole + "h " + mins + "m";
  }
  // refresh the little clock badge shown on a note.
  // if the task text fits on one line, the badge rides that same line; otherwise it drops below.
  function updateTimeBadge(el, t){
    const badge = el.querySelector(".time-badge");
    if(!badge) return;
    const h = +t.time || 0;
    badge.textContent = "⏱ " + fmtHours(h);
    if(h <= 0){ badge.classList.add("hidden"); badge.classList.remove("inline"); return; }
    badge.classList.remove("hidden");

    // try inline (sharing the text's line) first, then measure whether it actually fit
    const body = el.querySelector(".body");
    const txt  = el.querySelector(".txt");
    badge.classList.add("inline");
    body.appendChild(badge);
    const oneLine  = txt.offsetHeight <= 26;                // text is a single line
    const sameLine = badge.offsetTop <= txt.offsetTop + 4;  // badge didn't wrap beneath it
    if(!(oneLine && sameLine)){                             // doesn't fit — drop below
      badge.classList.remove("inline");
      el.insertBefore(badge, el.querySelector(".sub-add"));
    }
  }

  // ---------------- subtasks ----------------
  function emitSubs(t){ emitOp({ type:"subs", id:t.id, subs:t.subs }); }
  function editSub(stx){
    if(!stx || stx.getAttribute("contenteditable")==="true"){ stx&&stx.focus(); return; }
    beginInteract();
    stx.setAttribute("contenteditable","true"); stx.focus();
    const r = document.createRange(); r.selectNodeContents(stx); r.collapse(false);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(r);
  }
  function buildSubs(el, t){
    const wrap = el.querySelector(".subs");
    wrap.innerHTML = "";
    (t.subs||[]).forEach(s=>{
      const row = document.createElement("div");
      row.className = "sub" + (s.done ? " done" : "");
      row.dataset.sid = s.id;
      row.innerHTML = '<span class="sub-grip" title="Drag to reorder">⠿</span>' +
                      '<input type="checkbox" class="cb"><div class="sub-txt" spellcheck="false"></div>' +
                      '<span class="sub-x" title="Delete">×</span>';
      row.querySelector(".cb").checked = s.done;
      row.querySelector(".sub-txt").textContent = s.text;
      row.addEventListener("pointerdown", e=>e.stopPropagation());   // don't drag the note
      // drag the grip to reorder subtasks within the task
      row.querySelector(".sub-grip").addEventListener("pointerdown", ev=>{
        ev.preventDefault(); ev.stopPropagation();
        startSubDrag(ev, t, row, wrap);
      });
      row.querySelector(".cb").addEventListener("change", e=>{
        s.done = e.target.checked; row.classList.toggle("done", s.done); emitSubs(t);
      });
      const stx = row.querySelector(".sub-txt");
      stx.addEventListener("dblclick", ()=>editSub(stx));
      stx.addEventListener("blur", ()=>{
        if(stx.getAttribute("contenteditable")!=="true") return;
        stx.removeAttribute("contenteditable");
        const v = stx.textContent.trim(); stx.textContent = v;
        if(v !== s.text){ s.text = v; emitSubs(t); }
        endInteract();
      });
      stx.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); stx.blur(); } });
      row.querySelector(".sub-x").addEventListener("click", e=>{
        e.stopPropagation();
        t.subs = (t.subs||[]).filter(z=>z.id!==s.id); emitSubs(t); buildSubs(el, t);
      });
      wrap.appendChild(row);
    });
  }
  // pointer-drag a subtask row (by its grip) to reorder it within the task.
  // the grabbed row lifts and follows the cursor; an accent line marks where it will drop.
  function startSubDrag(e, t, row, wrap){
    if(e.button != null && e.button !== 0) return;
    const el  = wrap.closest(".note");
    const sid = row.dataset.sid;
    const startY = e.clientY;
    beginInteract();
    document.body.style.userSelect = "none";
    row.classList.add("sub-dragging");
    const line = document.createElement("div");
    line.className = "sub-drop-line";
    let targetIdx = null;

    const layout = clientY=>{
      row.style.transform = "translateY(" + (clientY - startY) + "px)";
      const others = [...wrap.querySelectorAll(".sub:not(.sub-dragging)")];
      let idx = others.length;
      for(let i=0;i<others.length;i++){
        const r = others[i].getBoundingClientRect();
        if(clientY < r.top + r.height/2){ idx = i; break; }
      }
      targetIdx = idx;
      if(idx < others.length) wrap.insertBefore(line, others[idx]); else wrap.appendChild(line);
      renderWires();
    };
    const move = ev=>{ ev.preventDefault(); layout(ev.clientY); };
    const finish = ()=>{
      window.removeEventListener("pointermove", move, true);
      window.removeEventListener("pointerup", finish, true);
      window.removeEventListener("pointercancel", finish, true);
      document.body.style.userSelect = "";
      line.remove();
      row.style.transform = "";
      row.classList.remove("sub-dragging");
      if(targetIdx != null){
        const cur = t.subs.slice();
        const from = cur.findIndex(s=>s.id===sid);
        if(from >= 0){
          const moved = cur.splice(from, 1)[0];       // remove first, then insert at the target slot
          cur.splice(targetIdx, 0, moved);
          const changed = cur.map(s=>s.id).join(",") !== t.subs.map(s=>s.id).join(",");
          t.subs = cur;
          buildSubs(el, t);                            // rebuild cleanly (resets transforms, new order)
          if(changed) emitSubs(t);
        }
      }
      renderWires();
      endInteract();
    };
    window.addEventListener("pointermove", move, true);
    window.addEventListener("pointerup", finish, true);
    window.addEventListener("pointercancel", finish, true);
    layout(startY);
  }

  // keep connection lines glued to notes whenever a note's size changes
  // (hovering reveals "+ subtask", subtasks added/removed, text grows, etc.)
  let _wireRaf = null;
  function scheduleWires(){ if(_wireRaf) return; _wireRaf = requestAnimationFrame(()=>{ _wireRaf = null; renderWires(); }); }
  const roWires = ("ResizeObserver" in window) ? new ResizeObserver(()=>scheduleWires()) : null;

  function renderNote(t){
    const el = document.createElement("div");
    el.className = "note";
    el.dataset.id = t.id;
    el.style.left = t.x + "px";
    el.style.top  = t.y + "px";
    el.style.setProperty("--rot", (t.rot||0) + "deg");
    el.style.setProperty("--accent", t.accent);
    el.innerHTML =
      '<div class="bar"></div>' +
      '<div class="link-handle" title="Link"></div>' +
      '<div class="body"><span class="grip">⠿</span><div class="txt" spellcheck="false"></div></div>' +
      '<div class="subs"></div>' +
      '<div class="time-badge hidden"></div>' +
      '<div class="sub-add">+ subtask</div>';
    el.querySelector(".txt").textContent = t.text;
    buildSubs(el, t);

    // add a subtask
    const addBtn = el.querySelector(".sub-add");
    addBtn.addEventListener("pointerdown", e=>e.stopPropagation());
    addBtn.addEventListener("click", e=>{
      e.stopPropagation();
      if(!t.subs) t.subs = [];
      t.subs.push({ id: uid(), text:"", done:false });
      emitSubs(t); buildSubs(el, t);
      const rows = el.querySelectorAll(".subs .sub");
      const last = rows[rows.length-1];
      if(last) editSub(last.querySelector(".sub-txt"));
    });

    // drag-to-connect handle
    el.querySelector(".link-handle").addEventListener("pointerdown", e=>startConnect(e, t.id));

    // edit
    const txt = el.querySelector(".txt");
    txt.addEventListener("dblclick", ()=>focusEdit(el));
    txt.addEventListener("blur", ()=>commitEdit(el));
    txt.addEventListener("keydown", e=>{
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); txt.blur(); }
    });

    // right-click -> accent picker
    el.addEventListener("contextmenu", e=>{
      e.preventDefault();
      showCtx(e.clientX, e.clientY, t.id);
    });

    // hovering reveals "+ subtask" etc. and changes the note's height — redraw links so they stay glued.
    // keep the expanded state for a moment after the cursor leaves so its buttons stay easy to click.
    let hoverTimer;
    el.addEventListener("mouseenter", ()=>{ clearTimeout(hoverTimer); el.classList.add("hovered"); renderWires(); });
    el.addEventListener("mouseleave", ()=>{
      clearTimeout(hoverTimer);
      hoverTimer = setTimeout(()=>{ el.classList.remove("hovered"); renderWires(); }, 650);
    });

    attachDrag(el);
    world.appendChild(el);
    updateTimeBadge(el, t);                 // measure & place now that it's in the DOM
    if(roWires) roWires.observe(el);
    return el;
  }

  function focusEdit(el){
    const txt = el.querySelector(".txt");
    if(txt.getAttribute("contenteditable")==="true"){ txt.focus(); return; }
    beginInteract();
    txt.setAttribute("contenteditable","true");
    el.style.cursor = "text";
    txt.focus();
    const range = document.createRange(); range.selectNodeContents(txt); range.collapse(false);
    const sel = getSelection(); sel.removeAllRanges(); sel.addRange(range);
  }
  function commitEdit(el){
    const txt = el.querySelector(".txt");
    if(txt.getAttribute("contenteditable")!=="true") return;   // wasn't being edited
    txt.removeAttribute("contenteditable");
    el.style.cursor = "grab";
    const t = state.tasks.find(v=>v.id===el.dataset.id);
    if(t){ t.text = txt.textContent.trim(); txt.textContent = t.text; emitOp({ type:"text", id:t.id, text:t.text }); updateTimeBadge(el, t); }
    endInteract();
  }

  function attachDrag(el){
    let sx, sy, ox, oy, moved, active=false, downTarget=null, lastTap=0;
    el.addEventListener("pointerdown", e=>{
      if(el.querySelector(".txt").getAttribute("contenteditable")==="true") return;
      if(e.button!==0) return;
      active = true; moved = false; downTarget = e.target;
      sx = e.clientX; sy = e.clientY;
      ox = parseFloat(el.style.left); oy = parseFloat(el.style.top);
      try{ el.setPointerCapture(e.pointerId); }catch(_){}
    });
    el.addEventListener("pointermove", e=>{
      if(!active) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if(!moved && Math.hypot(dx,dy) < 4) return;
      if(!moved){ moved = true; el.classList.add("dragging"); document.body.classList.add("holding"); beginInteract(); }
      el.style.left = (ox + dx) + "px";
      el.style.top  = (oy + dy) + "px";
      dropzone.classList.toggle("hot", overDrop(e.clientX, e.clientY));
      if(state.connections.length) renderWires();   // keep linked lines attached live
    });
    el.addEventListener("pointerup", e=>{
      if(!active) return;
      active = false;
      try{ el.releasePointerCapture(e.pointerId); }catch(_){}
      el.classList.remove("dragging");
      dropzone.classList.remove("hot");
      document.body.classList.remove("holding");
      if(!moved){
        if(e.pointerType === "touch"){
          const now = Date.now();
          if(downTarget && downTarget.closest(".body") && now - lastTap < 400){
            lastTap = 0; focusEdit(el);          // double-tap the name -> edit it
          } else {
            lastTap = now; activateNote(el);      // single tap selects the note so its controls appear
          }
        }
        return;
      }
      if(overDrop(e.clientX, e.clientY)){ completeTask(el); endInteract(); return; }
      const t = state.tasks.find(v=>v.id===el.dataset.id);
      if(!t){ endInteract(); return; }
      t.x = parseFloat(el.style.left);
      t.y = parseFloat(el.style.top);
      clampInto(t);
      el.style.left = t.x + "px"; el.style.top = t.y + "px";
      emitOp({ type:"move", id:t.id, x:t.x, y:t.y });
      if(state.connections.length) renderWires();
      endInteract();
    });
  }

  function overDrop(cx, cy){
    const z = dropzone.getBoundingClientRect();
    return cx>=z.left && cx<=z.right && cy>=z.top && cy<=z.bottom;
  }

  // ---------------- complete / undo ----------------
  function completeTask(el){
    const t = state.tasks.find(v=>v.id===el.dataset.id);
    if(!t) return;
    el.classList.add("completing");
    state.tasks = state.tasks.filter(v=>v.id!==t.id);
    t.ts = Date.now();
    state.completed.unshift(t);
    emitOp({ type:"complete", id:t.id, ts:t.ts }); updateBadges();
    renderWires();   // its lines vanish now, but the links are remembered for undo
    setTimeout(()=>{ el.remove(); refreshHint(); }, 280);
    toast("Done ✓");
  }
  function undoTask(id){
    const i = state.completed.findIndex(v=>v.id===id);
    if(i<0) return;
    const t = state.completed.splice(i,1)[0];
    delete t.ts;
    if(typeof t.x!=="number" || typeof t.y!=="number"){ const s=findSpot(); t.x=s.x; t.y=s.y; }
    clampInto(t);
    state.tasks.push(t);
    emitOp({ type:"undo", id:t.id, x:t.x, y:t.y });
    renderCompleted(); updateBadges();
    renderNote(t); refreshHint(); renderWires();   // remembered links reappear
    toast("Restored");
  }
  function deleteCompleted(id){
    state.completed = state.completed.filter(v=>v.id!==id);
    pruneConnections(id);
    emitOp({ type:"delDone", id }); renderCompleted(); updateBadges();
  }

  // ---------------- composer ----------------
  function autogrow(ta){ ta.style.height="auto"; ta.style.height=Math.min(ta.scrollHeight,120)+"px"; }
  function sendComposer(){
    const ta = document.getElementById("composerInput");
    const text = ta.value.trim();
    if(!text) return;
    const spot = findSpot();
    const t = {
      id: uid(), text,
      x: spot.x, y: spot.y,
      rot: +(Math.random()*10 - 5).toFixed(1),
      accent: composerAccent
    };
    state.tasks.push(t);
    emitOp({ type:"add", task:t });
    showView("board");
    renderNote(t); refreshHint();
    ta.value = ""; autogrow(ta); ta.focus();
    toast("Added");
  }

  // ---------------- right-click accent menu ----------------
  let ctxTargetId = null;
  function buildCtx(){
    ctxMenu.innerHTML =
      '<div class="ctx-title">Color</div><div class="sw-row"></div>' +
      '<div class="ctx-title ctx-time-title">Time worked</div>' +
      '<div class="ctx-time">' +
        '<span class="ctx-time-total">0h</span>' +
        '<div class="ctx-time-add">' +
          '<div class="ctx-time-field">' +
            '<input class="ctx-time-input" type="number" step="0.25" min="0" placeholder="hrs" inputmode="decimal">' +
            '<div class="ctx-time-steps">' +
              '<button type="button" class="ctx-step up" tabindex="-1" aria-label="Increase">' +
                '<svg viewBox="0 0 10 6" width="10" height="6"><path d="M1 5L5 1L9 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              '</button>' +
              '<button type="button" class="ctx-step down" tabindex="-1" aria-label="Decrease">' +
                '<svg viewBox="0 0 10 6" width="10" height="6"><path d="M1 1L5 5L9 1" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
              '</button>' +
            '</div>' +
