          '</div>' +
          '<button class="ctx-time-btn">Add</button>' +
        '</div>' +
      '</div>' +
      '<button class="ctx-edit">✎ Rename</button>' +
      '<button class="ctx-del">🗑 Delete</button>';
    const row = ctxMenu.querySelector(".sw-row");
    ACCENTS.forEach(c=>{
      const s = document.createElement("div");
      s.className = "sw"; s.style.background = c; s.dataset.color = c;
      s.addEventListener("click", e=>{ e.stopPropagation(); applyAccent(c); hideCtx(); });
      row.appendChild(s);
    });

    // add time (hours, e.g. 2.5) — accumulates into the task's total
    const input = ctxMenu.querySelector(".ctx-time-input");
    const addTime = ()=>{
      const v = parseFloat(input.value);
      if(!isFinite(v) || v <= 0){ input.value = ""; input.focus(); return; }
      addWorkedTime(v);
      input.value = "";
      input.focus();
    };
    ctxMenu.querySelector(".ctx-time-btn").addEventListener("click", e=>{ e.stopPropagation(); addTime(); });
    input.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); addTime(); } });
    input.addEventListener("click", e=>e.stopPropagation());

    // custom stepper arrows (±0.25, floored at 0)
    const step = dir=>{
      const cur = parseFloat(input.value) || 0;
      const next = Math.max(0, Math.round((cur + dir*0.25) * 100) / 100);
      input.value = next;
      input.focus();
    };
    ctxMenu.querySelector(".ctx-step.up").addEventListener("click", e=>{ e.stopPropagation(); step(1); });
    ctxMenu.querySelector(".ctx-step.down").addEventListener("click", e=>{ e.stopPropagation(); step(-1); });

    // rename: reuse the inline editor, which only touches the task's text
    ctxMenu.querySelector(".ctx-edit").addEventListener("click", e=>{
      e.stopPropagation();
      const id = ctxTargetId; hideCtx();
      const el = noteEl(id); if(el) focusEdit(el);
    });

    // delete this task
    ctxMenu.querySelector(".ctx-del").addEventListener("click", e=>{
      e.stopPropagation();
      const id = ctxTargetId; hideCtx();
      deleteTask(id);
    });
  }
  function showCtx(x, y, taskId){
    ctxTargetId = taskId;
    ctxMenu.classList.remove("hidden");
    const t = state.tasks.find(v=>v.id===taskId);
    ctxMenu.querySelectorAll(".sw").forEach(s=> s.classList.toggle("sel", t && s.dataset.color===t.accent));
    const totalEl = ctxMenu.querySelector(".ctx-time-total");
    if(totalEl) totalEl.textContent = fmtHours(t ? t.time : 0);
    const mw = ctxMenu.offsetWidth, mh = ctxMenu.offsetHeight;
    ctxMenu.style.left = Math.min(x, innerWidth  - mw - 8) + "px";
    ctxMenu.style.top  = Math.min(y, innerHeight - mh - 8) + "px";
  }
  function hideCtx(){ ctxMenu.classList.add("hidden"); ctxTargetId = null; }
  function deleteTask(id){
    if(!id) return;
    const el = noteEl(id);
    state.tasks = state.tasks.filter(v=>v.id!==id);
    pruneConnections(id);
    emitOp({ type:"del", id });
    if(el) el.remove();
    refreshHint(); renderWires();
  }
  function applyAccent(c){
    const t = state.tasks.find(v=>v.id===ctxTargetId);
    if(!t) return;
    t.accent = c; emitOp({ type:"accent", id:t.id, accent:c });
    const el = board.querySelector('.note[data-id="'+t.id+'"]');
    if(el) el.style.setProperty("--accent", c);
  }
  function addWorkedTime(hours){
    const t = state.tasks.find(v=>v.id===ctxTargetId);
    if(!t) return;
    t.time = +((+t.time || 0) + hours).toFixed(2);
    emitTime(t);
    const totalEl = ctxMenu.querySelector(".ctx-time-total");
    if(totalEl) totalEl.textContent = fmtHours(t.time);
    const el = noteEl(t.id);
    if(el) updateTimeBadge(el, t);
    toast("+" + fmtHours(hours));
  }

  // ---------------- render collections ----------------
  function renderBoard(){
    board.querySelectorAll(".note").forEach(n=>n.remove());
    renderGroups();
    state.tasks.forEach(renderNote);
    refreshHint();
    renderWires();
  }
  function renderCompleted(){
    const grid = document.getElementById("doneGrid");
    const countEl = document.getElementById("doneCount");
    grid.innerHTML = "";
    countEl.textContent = state.completed.length ? state.completed.length + " done" : "";
    if(!state.completed.length){
      grid.innerHTML = '<div class="empty-done"><div class="big">🌱</div>Nothing done yet.</div>';
      return;
    }
    state.completed.forEach(t=>{
      const c = document.createElement("div");
      c.className = "done-card";
      c.style.setProperty("--accent", t.accent || "#94a3b8");
      const subs = t.subs || [];
      const doneCount = subs.filter(s=>s.done).length;
      c.innerHTML =
        '<div class="cap"></div>' +
        '<div class="txt">'+ escapeHtml(t.text || "(empty)") +'</div>' +
        (subs.length
          ? '<div class="done-subs">' +
              '<div class="done-subs-head">Subtasks · '+ doneCount +'/'+ subs.length +'</div>' +
              subs.map(s=>
                '<div class="done-sub'+(s.done?' done':'')+'">' +
                  '<span class="tick">'+(s.done?'✓':'○')+'</span>' +
                  '<span class="t">'+ escapeHtml(s.text || "") +'</span>' +
                '</div>').join("") +
            '</div>'
          : "") +
        (t.time > 0 ? '<div class="when">⏱ '+ fmtHours(t.time) +' worked</div>' : '') +
        '<div class="when">Completed '+ fmt(t.ts) +'</div>' +
        '<div class="row">' +
          '<button class="btn undo">Undo</button>' +
          '<button class="btn del">Delete</button>' +
        '</div>';
      c.querySelector(".undo").addEventListener("click", ()=>undoTask(t.id));
      c.querySelector(".del").addEventListener("click", ()=>deleteCompleted(t.id));
      grid.appendChild(c);
    });
  }
  function updateBadges(){ document.getElementById("doneBadge").textContent = state.completed.length; }

  // ---------------- views ----------------
  function showView(name){
    const isBoard = name === "board";
    board.classList.toggle("hidden", !isBoard);
    completedView.classList.toggle("hidden", isBoard);
    document.getElementById("tabBoard").classList.toggle("active", isBoard);
    document.getElementById("tabDone").classList.toggle("active", !isBoard);
    document.body.classList.toggle("on-completed", !isBoard);   // hides the composer
    if(!isBoard) renderCompleted();
    hideCtx();
  }

  // ---------------- export / import ----------------
  function exportJson(){
    const blob = new Blob([JSON.stringify({ pages, seq }, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "stickytasks.json";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast("Exported");
  }
  function importJson(file){
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        ingestDoc(JSON.parse(reader.result));       // accepts new multi-page or old single-board files
        saveActivePage();
        emitOp({ type:"replace", doc:{ pages, seq } });   // shares the imported board with everyone
        pan = loadPan();
        renderSidebar(); renderAll(); applyPan();
        toast("Imported");
      }catch(e){ toast("Bad file"); }
    };
    reader.readAsText(file);
  }

  // ---------------- pages / workspaces (sidebar) ----------------
  let addingPage = false, renamingId = null, suppressPageClick = false;
  // grab a page's grip and drag it up/down to reorder the sidebar; an accent line marks the drop spot
  function startPageDrag(e, p, item, list){
    if(e.button != null && e.button !== 0) return;
    const startY = e.clientY, pageId = p.id;
    let moved = false, targetIdx = null;
    const line = document.createElement("div");
    line.className = "page-drop-line";
    document.body.style.userSelect = "none";
    item.classList.add("page-dragging");
    beginInteract();
    const layout = clientY=>{
      if(Math.abs(clientY - startY) > 3) moved = true;
      item.style.transform = "translateY(" + (clientY - startY) + "px)";
      const others = [...list.querySelectorAll(".page-item:not(.page-dragging)")];
      let idx = others.length;
      for(let i=0;i<others.length;i++){
        const r = others[i].getBoundingClientRect();
        if(clientY < r.top + r.height/2){ idx = i; break; }
      }
      targetIdx = idx;
      if(idx < others.length) list.insertBefore(line, others[idx]); else list.appendChild(line);
    };
    const move = ev=>{ ev.preventDefault(); layout(ev.clientY); };
    const finish = ()=>{
      window.removeEventListener("pointermove", move, true);
      window.removeEventListener("pointerup", finish, true);
      window.removeEventListener("pointercancel", finish, true);
      document.body.style.userSelect = "";
      line.remove(); item.style.transform = ""; item.classList.remove("page-dragging");
      if(moved){
        suppressPageClick = true;
        setTimeout(()=>{ suppressPageClick = false; }, 300);
      }
      if(moved && targetIdx != null){
        const cur = pages.slice();
        const from = cur.findIndex(x=>x.id===pageId);
        if(from >= 0){
          const movedPage = cur.splice(from, 1)[0];
          cur.splice(targetIdx, 0, movedPage);
          const changed = cur.map(x=>x.id).join(",") !== pages.map(x=>x.id).join(",");
          pages.splice(0, pages.length, ...cur);        // reorder in place (keep the same array)
          renderSidebar();
          if(changed) emitOp({ type:"reorderPages", order: pages.map(x=>x.id) });
        }
      }
      endInteract();
    };
    window.addEventListener("pointermove", move, true);
    window.addEventListener("pointerup", finish, true);
    window.addEventListener("pointercancel", finish, true);
    layout(startY);
  }
  function nextPageColor(){ return ACCENTS[pages.length % ACCENTS.length]; }
  function hexToRgba(hex, a){
    const n = parseInt((hex||"#3b82f6").replace("#",""), 16);
    return "rgba(" + ((n>>16)&255) + "," + ((n>>8)&255) + "," + (n&255) + "," + a + ")";
  }

  function renderSidebar(){
    const list = document.getElementById("pageList");
    list.innerHTML = "";
    pages.forEach(p=>{
      const item = document.createElement("div");
      item.className = "page-item" + (p.id === currentPageId ? " active" : "");

      if(p.id === renamingId){                                  // inline rename
        item.innerHTML = '<span class="page-dot"></span>';
        item.querySelector(".page-dot").style.background = p.color;
        const inp = document.createElement("input");
        inp.className = "page-input"; inp.value = p.name;
        item.appendChild(inp); list.appendChild(item);
        inp.focus(); inp.select();
        let done = false;
        const finish = save=>{ if(done) return; done = true; renamingId = null;
          const n = inp.value.trim();
          if(save && n && n !== p.name){ p.name = n; emitOp({ type:"renamePage", id:p.id, name:n }); }
          renderSidebar(); };
        inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){e.preventDefault();finish(true);} else if(e.key==="Escape"){e.preventDefault();finish(false);} });
        inp.addEventListener("blur", ()=>finish(true));
        return;
      }

      item.innerHTML = '<span class="page-grip" title="Drag to reorder">⠿</span><span class="page-dot"></span><span class="page-name"></span><span class="page-del" title="Delete">×</span>';
      item.querySelector(".page-dot").style.background = p.color;
      item.querySelector(".page-name").textContent = p.name;
      if(p.id === currentPageId){ item.style.background = hexToRgba(p.color, .2); item.style.color = p.color; }
      item.addEventListener("click", e=>{
        if(suppressPageClick){ suppressPageClick = false; return; }   // ignore the click that ends a drag
        if(e.target.closest(".page-del")) return;
        switchPage(p.id);
      });
      item.addEventListener("dblclick", e=>{ e.stopPropagation(); startRenamePage(p.id); });
      item.addEventListener("contextmenu", e=>{ e.preventDefault(); showPageCtx(e.clientX, e.clientY, p.id); });
      item.querySelector(".page-del").addEventListener("click", e=>{ e.stopPropagation(); deletePage(p.id); });
      // grab the grip to drag this page to a new position
      const grip = item.querySelector(".page-grip");
      grip.addEventListener("click", e=>{ e.stopPropagation(); });
      grip.addEventListener("pointerdown", e=>{ e.preventDefault(); e.stopPropagation(); startPageDrag(e, p, item, list); });
      list.appendChild(item);
    });

    if(addingPage){                                             // inline "new page" row
      const item = document.createElement("div");
      item.className = "page-item";
      const color = nextPageColor();
      item.innerHTML = '<span class="page-dot"></span>';
      item.querySelector(".page-dot").style.background = color;
      const inp = document.createElement("input");
      inp.className = "page-input"; inp.placeholder = "Page name";
      item.appendChild(inp); list.appendChild(item);
      inp.focus();
      let done = false;
      const finish = save=>{ if(done) return; done = true; addingPage = false;
        const n = inp.value.trim();
        if(save && n) addPageNamed(n, color); else renderSidebar(); };
      inp.addEventListener("keydown", e=>{ if(e.key==="Enter"){e.preventDefault();finish(true);} else if(e.key==="Escape"){e.preventDefault();finish(false);} });
      inp.addEventListener("blur", ()=>finish(true));
    }
  }
  function startAddPage(){ renamingId = null; addingPage = true; renderSidebar(); }
  function startRenamePage(id){ addingPage = false; renamingId = id; renderSidebar(); }
  function addPageNamed(name, color){
    const p = { id: pid(), name, color, tasks:[], completed:[], connections:[] };
    pages.push(p);
    emitOp({ type:"addPage", page:{ id:p.id, name:p.name, color:p.color } });
    switchPage(p.id);
    toast("Page added");
  }
  function setPageColor(id, color){
    const p = pageById(id); if(!p) return;
    p.color = color; emitOp({ type:"pageColor", id, color });
    renderSidebar();
  }
  function switchPage(id){
    if(!pageById(id) || id === currentPageId) return;
    savePan();                                    // remember our spot on the page we're leaving
    const keepView = onCompletedView() ? "completed" : "board";   // stay on whichever tab we're on
    currentPageId = id; state = pageById(id); saveActivePage();
    colorIx = state.tasks.length + state.completed.length;
    pan = loadPan();
    showView(keepView);
    renderSidebar(); renderAll(); applyPan();
  }
  // right-click a page: color swatches + rename
  let pageCtxId = null;
  function showPageCtx(x, y, id){
    const p = pageById(id); if(!p) return;
    pageCtxId = id;
    const el = document.getElementById("pageCtx");
    el.innerHTML = '<div class="ctx-title">Color</div><div class="sw-row"></div><button class="ctx-edit">✎ Rename</button>';
    const row = el.querySelector(".sw-row");
    ACCENTS.forEach(c=>{
      const s = document.createElement("div");
      s.className = "sw" + (c === p.color ? " sel" : "");
      s.style.background = c;
      s.addEventListener("click", e=>{ e.stopPropagation(); setPageColor(id, c); hidePageCtx(); });
      row.appendChild(s);
    });
    el.querySelector(".ctx-edit").addEventListener("click", e=>{ e.stopPropagation(); const rid = pageCtxId; hidePageCtx(); startRenamePage(rid); });
    el.classList.remove("hidden");
    const mw = el.offsetWidth, mh = el.offsetHeight;
    el.style.left = Math.min(x, innerWidth - mw - 8) + "px";
    el.style.top  = Math.min(y, innerHeight - mh - 8) + "px";
  }
  function hidePageCtx(){ document.getElementById("pageCtx").classList.add("hidden"); pageCtxId = null; }
  function deletePage(id){
    if(pages.length <= 1){ toast("Keep 1 page"); return; }
    const p = pageById(id); if(!p) return;
    if(!confirm('Delete “' + p.name + '”?')) return;
    pages = pages.filter(x=>x.id!==id);
    try{ localStorage.removeItem("floating-tasks.pan." + id); }catch(e){}
    emitOp({ type:"delPage", id });
    if(currentPageId === id){
      currentPageId = pages[0].id; state = pageById(currentPageId); saveActivePage();
      colorIx = state.tasks.length + state.completed.length;
      pan = loadPan();
    }
    renderSidebar(); renderAll(); applyPan();
    toast("Deleted");
  }
  // ---------------- dropdown menu (hidden extras) ----------------
  function buildMenu(){
    const m = document.getElementById("menuPop");
    m.innerHTML =
      '<button class="m-item" id="menuCenter">⌖  Center</button>' +
      '<button class="m-item" id="themeItem">🌙  Dark</button>' +
      '<div class="m-sep"></div>' +
      '<button class="m-item" id="menuExport">⬇  Export</button>' +
      '<button class="m-item" id="menuImport">⬆  Import</button>' +
      '<div class="m-sep"></div>' +
      '<div class="m-info" id="status"></div>';
    m.querySelector("#menuCenter").addEventListener("click", ()=>{ hideMenu(); centerView(); });
    m.querySelector("#themeItem").addEventListener("click", toggleTheme);
    m.querySelector("#menuExport").addEventListener("click", ()=>{ hideMenu(); exportJson(); });
    m.querySelector("#menuImport").addEventListener("click", ()=>{ hideMenu(); document.getElementById("fileInput").click(); });
    renderStatus();
  }
  function showMenu(){
    const m = document.getElementById("menuPop");
    m.classList.remove("hidden");
    const b = document.getElementById("menuBtn").getBoundingClientRect();
    const mw = m.offsetWidth;
    m.style.left = Math.max(8, Math.min(b.right - mw, innerWidth - mw - 8)) + "px";
    m.style.top = (b.bottom + 8) + "px";
  }
  function hideMenu(){ document.getElementById("menuPop").classList.add("hidden"); }

  // ---------------- composer color picker ----------------
  function loadComposerAccent(){
    try{ const c = localStorage.getItem(NEWCOLOR_KEY); if(ACCENTS.indexOf(c) >= 0) return c; }catch(e){}
    return ACCENTS[3];
  }
  function setComposerAccent(c){
    composerAccent = c;
    try{ localStorage.setItem(NEWCOLOR_KEY, c); }catch(e){}
    document.getElementById("composerColor").style.background = c;
  }
  function buildColorPop(){
    const pop = document.getElementById("colorPop");
    pop.innerHTML = '<div class="ctx-title">Color</div><div class="sw-row"></div>';
    const row = pop.querySelector(".sw-row");
    ACCENTS.forEach(c=>{
      const s = document.createElement("div");
      s.className = "sw" + (c === composerAccent ? " sel" : "");
      s.style.background = c;
      s.addEventListener("click", e=>{ e.stopPropagation(); setComposerAccent(c); hideColorPop(); });
      row.appendChild(s);
    });
  }
  function showColorPop(){
    buildColorPop();
    const pop = document.getElementById("colorPop");
    pop.classList.remove("hidden");
    const dot = document.getElementById("composerColor").getBoundingClientRect();
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let left = Math.max(8, Math.min(dot.left + dot.width/2 - pw/2, innerWidth - pw - 8));
    let top = dot.top - ph - 10;                          // prefer above the dot
    if(top < 8) top = dot.bottom + 10;
    pop.style.left = left + "px"; pop.style.top = top + "px";
  }
  function hideColorPop(){ document.getElementById("colorPop").classList.add("hidden"); }

  // ---------------- wire up ----------------
  // middle-mouse-drag to pan the board
  function setupPan(){
    let panning=false, sx=0, sy=0, ox=0, oy=0, moved=false, viaTouch=false;
    // stop the browser's middle-click autoscroll / paste
    board.addEventListener("mousedown", e=>{ if(e.button===1) e.preventDefault(); });
    board.addEventListener("auxclick",  e=>{ if(e.button===1) e.preventDefault(); });
    board.addEventListener("pointerdown", e=>{
      const touch = e.pointerType === "touch";
      // desktop: middle mouse anywhere.  touch: one finger on empty board space.
      // (notes / link dots handle their own gestures, so leave those to them)
      if(e.button!==1 && !(touch && !e.target.closest(".note"))) return;
      e.preventDefault();
      panning=true; viaTouch=touch; moved=false;
      sx=e.clientX; sy=e.clientY; ox=pan.x; oy=pan.y;
      board.classList.add("panning"); hideCtx();
      try{ board.setPointerCapture(e.pointerId); }catch(_){}
    });
    board.addEventListener("pointermove", e=>{
      if(!panning) return;
      const dx = e.clientX - sx, dy = e.clientY - sy;
      if(!moved && Math.hypot(dx,dy) < 4) return;   // ignore tiny jitter so a tap stays a tap
      moved = true;
      pan.x = ox + dx; pan.y = oy + dy;
      applyPan();
    });
    const end = e=>{
      if(!panning) return;
      panning=false; board.classList.remove("panning");
      try{ board.releasePointerCapture(e.pointerId); }catch(_){}
      if(moved) savePan();
      // a touch tap on empty space (no real drag) clears the mobile selection
      else if(viaTouch) clearActivated();
      viaTouch=false; moved=false;
    };
    board.addEventListener("pointerup", end);
    board.addEventListener("pointercancel", end);
  }

  function wire(){
    document.getElementById("fileInput").addEventListener("change", e=>{
      if(e.target.files[0]) importJson(e.target.files[0]);
      e.target.value = "";
    });
    document.getElementById("tabBoard").addEventListener("click", ()=>showView("board"));
    document.getElementById("tabDone").addEventListener("click", ()=>showView("completed"));
    document.getElementById("addPageBtn").addEventListener("click", startAddPage);
    document.getElementById("menuBtn").addEventListener("click", e=>{
      e.stopPropagation();
      const m = document.getElementById("menuPop");
      if(m.classList.contains("hidden")) showMenu(); else hideMenu();
    });
    document.getElementById("composerColor").addEventListener("click", e=>{
      e.stopPropagation();
      const pop = document.getElementById("colorPop");
      if(pop.classList.contains("hidden")) showColorPop(); else hideColorPop();
    });
    document.getElementById("groupTool").addEventListener("click", e=>{ e.stopPropagation(); setDrawMode(!drawMode); });

    // the little ✕ that removes a hovered connection
    wireDel.addEventListener("mouseenter", ()=>clearTimeout(hideDelTimer));
    wireDel.addEventListener("mouseleave", scheduleHideDel);
    wireDel.addEventListener("click", ()=>{ if(wireDel._id) removeConnection(wireDel._id); });

    const ta = document.getElementById("composerInput");
    ta.addEventListener("input", ()=>autogrow(ta));
    ta.addEventListener("keydown", e=>{
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendComposer(); }
    });
    document.getElementById("sendBtn").addEventListener("click", sendComposer);

    setupPan();
    setupDraw();

    // close the popups on outside interaction
    document.addEventListener("click", e=>{
      if(!e.target.closest("#ctxMenu")) hideCtx();
      if(!e.target.closest("#colorPop") && !e.target.closest("#composerColor")) hideColorPop();
      if(!e.target.closest("#menuPop") && !e.target.closest("#menuBtn")) hideMenu();
      if(!e.target.closest("#pageCtx")) hidePageCtx();
      if(!e.target.closest("#groupPop") && !e.target.closest(".g-color")) hideGroupPop();
    });
    document.addEventListener("pointerdown", e=>{ if(!e.target.closest("#ctxMenu")) hideCtx(); }, true);
    window.addEventListener("scroll", hideCtx, true);
    document.addEventListener("keydown", e=>{
      const t = e.target;
      const typing = t && (t.tagName==="TEXTAREA" || t.isContentEditable);
      if(e.key==="Escape"){ hideCtx(); hideColorPop(); hideMenu(); hidePageCtx(); hideGroupPop(); if(drawMode) setDrawMode(false); }
      if(e.key==="Home" && !typing){ e.preventDefault(); centerView(); }
    });

    window.addEventListener("resize", ()=>{ hideCtx(); hideColorPop(); hideMenu(); hidePageCtx(); hideGroupPop(); });
  }

  // ---------------- init ----------------
  (async function init(){
    const ok = await connectLive();       // join the shared board if a server is there
    if(!ok){
      // opened as a plain file (or no server) — fall back to this browser's own storage
      let d = null;
      try{ d = JSON.parse(localStorage.getItem(KEY) || "null"); }catch(e){}
      ingestDoc(d || {});
    }
    composerAccent = loadComposerAccent();
    pan = loadPan();
    buildCtx();
    buildMenu();
    wire();
    setComposerAccent(composerAccent);    // paint the composer's color dot
    renderSidebar();
    renderBoard();
    applyPan();
    renderCompleted();
    updateBadges();
    updateStatus();
    applyTheme(currentTheme());
    document.getElementById("composerInput").focus();
  })();
})();
</script>
